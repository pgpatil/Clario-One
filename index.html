  if(!(e.target.closest&&e.target.closest('.rte-dd'))){['rteFgPop','rteHiPop'].forEach(id=>{const p=g(id);if(p)p.style.display='none';});}});
// Tab / Shift-Tab inside a rich editor = indent / outdent (Word-style sub-bullets)
document.addEventListener('keydown',e=>{const el=e.target;if(el&&el.classList&&el.classList.contains('rte')&&e.key==='Tab'){e.preventDefault();try{document.execCommand('styleWithCSS',false,true);}catch(_){}document.execCommand(e.shiftKey?'outdent':'indent',false,null);}});
function newDump(){openTask();const t=g('tTitle');if(t)t.placeholder='Park an idea — leave the date empty';toast('No date = stays in Brain dump until you schedule it.');}

/* ═══ HELP / FAQ ═══ */
function faqItem(q,a){const key=(q+' '+a).replace(/<[^>]+>/g,' ').toLowerCase();return`<details class="faqi" data-k="${esc(key)}"><summary>${q}</summary><div class="fa">${a}</div></details>`;}
function vHelp(){
  return pagehead('HELP','How Clario works','Every feature, what it does, and how to use it','')+
  `<div class="card"><div class="cb"><input id="faqQ" placeholder="Search the FAQ — e.g. 'follow up', 'encryption', 'kanban'" value="${esc(window._faqQ||'')}" oninput="faqSearch(this.value)" style="width:100%"><div id="faqNo" class="note" style="display:none;margin-top:6px">No matches.</div></div></div>`+
  `<div class="card faq"><div class="ch">Capturing work</div>
  ${faqItem('Quick capture bar (Home)','Type anything and press Add. Clario reads the sentence: <code>@Priya MIS by friday</code> delegates to Priya with a Friday due date and starts chasing it. <code>call Rajesh tomorrow 3pm</code> creates a call scheduled for 3 pm tomorrow. <code>!high</code> or <code>urgent</code> sets priority. <code>today / tomorrow / monday…sunday / next week</code> set dates. No date at all sends it to the Brain dump. The 🎙 button dictates instead of typing (Edge/Chrome).')}
  ${faqItem('Keyboard shortcuts (desktop)','On a laptop or desktop, single keys work when you are not typing in a field: t new task, c new call, m new meeting, a new account, p new person, g Home, l Planner, k Tasks, / or Ctrl+K to search, ? for help. In the search box, arrow keys move through results and Enter opens the highlighted one. Inside any add/edit window, Enter saves.')}
  ${faqItem('+ New menu','The + New button in the top bar creates anything from anywhere: tasks, calls, brain-dump ideas, meetings, accounts, deals, people, decisions and improvement ideas. Inside the task window, the small + buttons beside Owner, Department and Account create a new person, department or account without leaving the form.')}
  ${faqItem('Brain dump','A holding area for ideas that have no date yet, so they never clutter today. Add from the + New menu, from the capture bar (just omit any date word), or from the Brain dump box in the Day planner. When ready, open the Day view and tap "This day" or "Next" to schedule an idea, or open it and give it a date.')}
  </div>
  <div class="card faq"><div class="ch">Planner</div>
  ${faqItem('Day view','Left side is your timeline, 7:00–21:00: meetings (blue), calls (green) and timed tasks (grey) placed at their hour, with a red line at the current time. Right side: Top 3 outcomes for the day, a capacity bar, tasks due today that still need a time slot ("To place"), and the Brain dump.')}
  ${faqItem('Capacity bar','Adds up today’s meeting durations plus the time estimates of every task due today, against an 8-hour day. Turns red when you’ve committed more than 8 hours — the signal to move something before the day starts, not after it fails.')}
  ${faqItem('Top 3 / focus stars','Two ways to force priority. Top 3 in the Day view: the three outcomes the day is for. The ★ star on any task marks it as focus (max three) and pins it to Today’s focus on Home.')}
  ${faqItem('Shutdown ritual','At day end, press Run shutdown in the Day view. Every unfinished item rolls to tomorrow, but its original due date is kept — so slips stay visible and honest instead of resetting each night. The journal box saves your notes and reflections per day.')}
  ${faqItem('Week and Month','Week shows seven columns with everything scheduled, plus weekly priorities on top — add items straight into any day with its Add box. Month shows the grid with monthly goals above it; tap a date to see and add to that day. ‹ › arrows move through time; Today jumps back.')}
  ${faqItem('Meetings','Each meeting pulls the parked agenda items of its attendees automatically. Record decisions and actions during the meeting — actions assigned to others become chase items instantly — and capture rich-text minutes in the Minutes / discussion notes box. Close out asks the outcome: Held (marks done, raises agenda items, stamps the account log), Rescheduled (set a new date; a fresh meeting is created and the open agenda carries over), or Not attended. Summary opens a consolidated, printable page — title, attendees, agenda, decisions, actions and notes — with Print and Email buttons. The Meetings tab lists upcoming and past meetings with search and status filter; import/export Outlook .ics from there. Summary prints a Minutes of Meeting sheet.')}
  </div>
  <div class="card faq"><div class="ch">Commitments & chasing</div>
  ${faqItem('What is "Chase" / "waiting on others"?','Every task you assign to someone else (via @name, the Owner field, or a meeting action) becomes a <b>waiting</b> item: they owe it to you. The Chase card on Home shows the four most urgent by follow-up date; Commitments → To chase shows all of them grouped by person. Tap an item to update it, mark it done when delivered, or push the follow-up date after you’ve nudged them. If a delegated item is overdue on its follow-up, it shows red.')}
  ${faqItem('My plate vs To chase','My plate is what you owe others — your own open tasks by due date. To chase is the mirror: what others owe you. The Home KPIs "Due today" and "To chase" track both directions.')}
  ${faqItem('Calls','Calls are first-class items with a scheduled time and a phone number — the ✆ number dials directly on a phone. Completing a call linked to an account writes it into that account’s activity history automatically.')}
  ${faqItem('Overdue and original dates','When a task slips, Clario shows both the current due date and the original one, with the age in days. Rollovers never erase history — the Review page surfaces your oldest slips by original commitment.')}
  ${faqItem('Row actions — reschedule, snooze, delete','Every task row carries quick buttons: → moves it to tomorrow without opening it; ⏲ (on waiting items) pushes the follow-up a day after you nudge someone; ✎ opens it; ✕ deletes it after a confirm. No need to open the record for the common moves.')}
  ${faqItem('Bulk actions on Commitments','On To chase and My plate, tick the checkboxes to select several items, then use the bar that appears to reschedule, push follow-ups, reassign to another person, or mark done — all at once. Useful after a review meeting when several things move together.')}
  ${faqItem('Recurring tasks','Give any task a Repeat (daily, weekly, fortnightly, monthly). When you complete it, Clario schedules the next occurrence automatically from its due date — for standing work like weekly MIS or a monthly review, you enter it once. A ↻ badge marks repeating items.')}
  </div>
  <div class="card faq"><div class="ch">People</div>
  ${faqItem('People — cards or list','The team view toggles between Cards and List (top right); the list sorts by name, role, department, waiting count or oldest item. Each person opens a page: items parked for your next 1:1, everything you’re waiting on from them, and recent deliveries. A person can face several accounts — link them from the account page (Our team on this account), and every account they cover shows on theirs.')}
  </div>
  <div class="card faq"><div class="ch">CRM — accounts and pipeline</div>
  ${faqItem('Accounts — list, sort, filter, cards','The accounts list sorts by any column — click a header to sort, click again to reverse. Filter by KAM or segment, or search name, city and segment. Toggle between List and Cards (top right). Each account opens its own page: details, contacts (tap ✆ to dial), open items, meetings, deals, the rich Notes & calls panel, and a stamped activity timeline.')}
  ${faqItem('Tasks tab and task pages','The Tasks tab is a flat, filterable list of every task in one place — separate from Commitments, which is the chase workflow. Filter by status (open, overdue, done), owner or department, search, and sort any column. Click a row to open the task page: rich notes to capture the conversation, follow-on tasks you can spin off, and — when the task is tagged to an account — everything logged straight to that account’s trail. Completing any task or call tagged to an account (and contact) writes to that account’s activity log automatically. Saving notes on a task, call or meeting also posts the full formatted notes to the account trail — updating the same entry rather than piling up duplicates — so you can read what was discussed straight from the account after it’s done. Each task, call and meeting has a Summary button that opens a sheet with notes and actions. Print / PDF prints it. Because email links can only carry plain text, use Copy formatted to copy the whole summary with bullets and formatting, then paste it into a new Outlook mail — the Email button opens a plain-text draft. When generating a summary you can tick who was present, chosen from both people and account contacts.')}
  ${faqItem('Editing log entries','Notes and calls in an activity trail can be edited — hover an entry and use ✎ to change its text or type, or ✕ to delete. Edited entries are marked. This applies on account and deal pages wherever the Notes & calls trail appears.')}
  ${faqItem('Contacts (FPRs)','Add a contact from any account page — name, role, phone, email, notes. Click a contact to edit it, or the ✕ to remove. The Contacts tab lists every contact across all accounts, searchable and sortable by name, role, account, phone or email, with an account filter. You can also create a contact from + New, and the global search finds contacts by name.')}
  ${faqItem('Next action — the one rule','Each account names a <b>key account manager</b> — one of your internal people, shown on the account and in the accounts list, starred in the team card. Every account should also always carry exactly one next action. That next action is now a <b>real task</b> tagged to the account and owned by the KAM (or you), so it appears on Home, in the planner and in Commitments with everything else — not in a separate silo. Press ✓ Done and it’s completed and logged, and Clario immediately asks for the next one. Actions due today or overdue also surface on the Sales dashboard. This single habit keeps accounts from going quiet.')}
  ${faqItem('Notes & calls','On an account or a deal, the Notes & calls box takes rich text — bold, italic, bulleted or numbered lists, and links, via the small toolbar. <b>Save note</b> or <b>Log as call</b> timestamps it into the activity trail. Write your notes as a list of points, and each saved point shows a <b>+ task</b> on hover — one click turns that line into a task tagged to the account or deal. Completed calls and meetings also land in the trail automatically. Names shown anywhere — account, person, department — are clickable and jump straight to that record.')}
  ${faqItem('Pipeline stages and forecast','Deals move Prospect → Qualified → Proposal → Negotiation → Won/Lost. Each stage carries a win probability (10/30/55/75%), so the weighted forecast = value × probability summed across open deals — a more honest number than the raw total. Move deals by dragging (desktop), the ‹ › buttons on each card (touch), or tapping the stage path on the deal page.')}
  ${faqItem('Stale deals and slipped closes','A deal with no logged activity for 14+ days is flagged stale (amber stripe). Deals whose expected close date has passed show ⚠ and appear on the Sales dashboard. Both are your prompt to act or kill the deal. Marking Lost asks for a reason so patterns become visible; marking Won stamps the quarter.')}
  ${faqItem('Line items on a deal','Inside a deal, add line items — product, quantity and rate. Clario totals them (qty × rate) and, when any line exists, that total becomes the deal value automatically, overriding the plain Value field. The deal page then shows a full line-item table with per-line amounts and a grand total. Products typed here are remembered for next time.')}
  ${faqItem('Recurring supply and reorder watch','On the account, set a supply cadence (weekly, fortnightly, monthly, quarterly), the last order date, and a short note on typical volume or SKUs. Clario watches the gap: once an order is overdue past 1.5× the cadence it flags red, and as it approaches it flags amber. The account shows a supply card with a one-tap "Log order today", and the Sales dashboard carries a "reorder watch" list of every account due or overdue — the supply-side mirror of stale deals. This is single-user tracking, not automated ordering.')}
  </div>
  <div class="card faq"><div class="ch">Decide — tools & log</div>
  ${faqItem('Decision log','Record every significant decision with its rationale and a review date. When the review date arrives, the decision resurfaces on the Decide page and Weekly Review — so you actually check whether it worked. Decisions recorded in a meeting link to it and its attendees.')}
  ${faqItem('Weighted decision matrix','List options and criteria, weight each criterion 1–10, score options 0–10. Clario computes weighted totals and highlights the winner; File as decision writes it to the log with a 90-day review. If a small weight change flips the winner, the call is close — decide on the intangibles.')}
  ${faqItem('Pre-mortem','Assume the plan already failed and list why. This framing surfaces risks optimism hides. Rate each reason’s likelihood, write a mitigation, then one tap turns every high-likelihood mitigation into a task due in 7 days.')}
  ${faqItem('5 Whys','Start from the problem and ask why five times to reach the root cause, then define the countermeasure and convert it to a task. Fixes the source, not the symptom.')}
  ${faqItem('Pareto 80/20','Enter causes with their counts (complaints, defects, delay-days, ₹ value). The chart sorts them and draws the cumulative line — the blue bars are the vital few driving ~80% of the effect. Work those first.')}
  ${faqItem('SWOT','Four honest boxes: internal strengths and weaknesses, external opportunities and threats. Saved like every exercise, reopenable from Saved exercises.')}
  ${faqItem('Improvement backlog','Capture every "we should fix this someday", score impact and effort 1–5, and read the quadrant: high impact + low effort = quick wins, do first. Track status open → in progress → done.')}
  </div>
  <div class="card faq"><div class="ch">Dashboards & review</div>
  ${faqItem('Searching this FAQ','Use the search box at the top of Help to filter these entries by keyword — matches expand automatically. Everything in Clario is cross-linked too: names of accounts, people and departments are clickable wherever they appear, and every number and row on the dashboards jumps to the underlying list.')}
  ${faqItem('Operations dashboard','Throughput trend (completed vs added, 8 weeks), overdue by department, a department scorecard with oldest slips, and delegation health per person — who’s sitting on what and for how long.')}
  ${faqItem('Sales dashboard','Open pipeline, weighted forecast, won this quarter, stage-wise value, stale deals, slipped close dates, and account next actions due.')}
  ${faqItem('Weekly review','One page to close the week: done vs added, overdue, stuck delegations, deals won, this week’s priorities scored, oldest slips by original date, and decisions due for review. Export as .md or print, then tap Plan next week to set the next three priorities while it’s fresh.')}
  </div>
  <div class="card faq"><div class="ch">Data, sync & devices</div>
  ${faqItem('Where does my data live?','On each device (browser storage) and in one file — db.json — in your OneDrive. No server, no login to Clario itself. The app file and your data are fully separate.')}
  ${faqItem('OneDrive account sync (all devices)','Settings → paste your Azure client ID → Sign in with Microsoft. Clario then reads/writes Apps/Clario/db.json in your OneDrive directly — works on iPhone, iPad, Android and desktop. It pulls before every save and checks for other-device changes every 20 seconds; edits merge record-by-record with the newer change winning.')}
  ${faqItem('OneDrive folder sync (desktop fallback)','Edge/Chrome on desktop can instead link a local OneDrive folder from Settings. Same file, same merging; the link persists across launches.')}
  ${faqItem('Excel import & export','Settings → Bulk data. Pick a data set from the dropdown, then Template, Export or Import — no long list of buttons. Importable sets: tasks, people, accounts, contacts, deals, decisions, meetings, improvement ideas, departments and products. Names do the linking — unknown people and accounts are created automatically. People, accounts, contacts, departments and products update existing records by name; tasks, deals, meetings, decisions and ideas always add new rows, so don’t import the same sheet twice. Logs — the activity history, 1:1 agenda items, planner goals, decision exercises and shutdown journal — are export-only: you can download them for reference, but they can’t be imported, since editing a record of what happened would fabricate it.')}
  ${faqItem('Encryption','Settings → Encrypt db.json protects the synced file with a passphrase (AES-256). Every device asks for the passphrase once. Losing the passphrase means losing the synced file — there is no recovery.')}
  ${faqItem('Install as an app','Desktop Edge/Chrome: menu → Apps → Install. Android Chrome: menu → Install app. iPhone/iPad Safari: Share → Add to Home Screen. The installed app works offline; sync resumes when online.')}
  </div>`;}
function faqSearch(q){window._faqQ=q;q=(q||'').trim().toLowerCase();
  document.querySelectorAll('.faqi').forEach(d=>{const hit=!q||(d.getAttribute('data-k')||'').includes(q);d.style.display=hit?'':'none';if(q&&hit)d.open=true;if(!q)d.open=false;});
  document.querySelectorAll('.card.faq').forEach(card=>{const any=[...card.querySelectorAll('.faqi')].some(d=>d.style.display!=='none');card.style.display=any?'':'none';});
  const anyAll=[...document.querySelectorAll('.faqi')].some(d=>d.style.display!=='none');const no=g('faqNo');if(no)no.style.display=anyAll?'none':'';}

/* ═══ ACCOUNTS (CRM) ═══ */
const CADENCE_DAYS={weekly:7,fortnightly:14,monthly:30,quarterly:92};
function supplyLapsed(c){if(!c.cadence||!c.last_order||!CADENCE_DAYS[c.cadence])return false;return ageDays(c.last_order)>Math.round(CADENCE_DAYS[c.cadence]*1.5);}
function supplyDue(c){if(!c.cadence||!c.last_order||!CADENCE_DAYS[c.cadence])return false;const d=CADENCE_DAYS[c.cadence],a=ageDays(c.last_order);return a>=d&&a<=Math.round(d*1.5);}
function logOrderToday(cid){const c=customers.find(x=>x.id===cid);if(!c)return;c.last_order=today();c.updated_at=now();logActivity('note','Order logged',cid,null);persist();renderView();toast('Order dated today.');}
function vAccounts(){
  if(viewArg){const c=CU().find(x=>x.id===viewArg);if(c)return acctPage(c);}
  const q=(window._cq||'').toLowerCase();const td=today();const kf=window._caKam||'';const sf=window._caSeg||'';
  let list=CU().filter(c=>(!q||(c.name+' '+(c.city||'')+' '+(c.segment||'')).toLowerCase().includes(q))
    &&(!kf||(kf==='__none'?!c.kam_id:c.kam_id===kf))&&(!sf||(c.segment||'')===sf));
  const meta=c=>{const dls=openDeals().filter(d=>d.customer_id===c.id);return{
    nCo:CO().filter(x=>x.customer_id===c.id).length,
    open:T().filter(t=>t.customer_id===c.id&&t.status!=='done').length,
    dls:dls.length,dv:dls.reduce((a,d)=>a+(+d.value||0),0),nt:acctNextTask(c.id)};};
  const getters={name:c=>c.name,kam:c=>c.kam_id?pname(c.kam_id):'',segment:c=>c.segment||'',city:c=>c.city||'',
    deals:c=>meta(c).dv,open:c=>meta(c).open,na:c=>{const t=acctNextTask(c.id);return t&&t.due?t.due:'9999';}};
  list=applySort('accounts',list,getters);
  if(!_sort.accounts)list=list.sort((a,b)=>a.name.localeCompare(b.name));
  const segs=[...new Set(CU().map(c=>c.segment).filter(Boolean))].sort();
  const kams=[...new Set(CU().map(c=>c.kam_id).filter(Boolean))];
  const view=_view.accounts||'list';
  const filters=`<div class="filters"><input placeholder="Search name, city, segment" value="${esc(window._cq||'')}" oninput="window._cq=this.value;clearTimeout(window._ct);window._ct=setTimeout(()=>{renderView();const i=document.querySelector('.filters input');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}},260)" style="min-width:220px">
    <select onchange="window._caKam=this.value;renderView()"><option value="">All KAMs</option><option value="__none"${kf==='__none'?' selected':''}>— No KAM —</option>${kams.map(id=>`<option value="${id}"${kf===id?' selected':''}>${esc(pname(id))}</option>`).join('')}</select>
    <select onchange="window._caSeg=this.value;renderView()"><option value="">All segments</option>${segs.map(x=>`<option${sf===x?' selected':''}>${esc(x)}</option>`).join('')}</select>
    ${(kf||sf||q)?`<button class="btn gh2 sm" onclick="window._cq='';window._caKam='';window._caSeg='';renderView()">Clear</button>`:''}
    ${viewToggle('accounts',view)}</div>`;
  let body;
  if(!list.length){body='<div class="card"><div class="empty">No accounts match. Add one, or clear the filters.</div></div>';}
  else if(view==='card'){
    body=`<div class="pgrid">${list.map(c=>{const m=meta(c);return`<div class="acard" onclick="nav('accounts','${c.id}')"><div class="an">${esc(c.name)}</div>
      <div class="ameta">${esc(c.segment||'')}${c.segment&&c.city?' · ':''}${esc(c.city||'')}${c.kam_id?' · KAM '+esc(pname(c.kam_id)):''}</div>
      <div class="astats"><span>Contacts <b class="num">${m.nCo}</b></span><span>Open <b class="num">${m.open}</b></span>${m.dls?`<span>Deals <b class="num">${m.dls}</b> · ${fmtMoney(m.dv)}</span>`:''}</div>
      ${m.nt?`<div class="ameta" style="margin-top:6px"><span class="due ${m.nt.due&&m.nt.due<td?'over':m.nt.due===td?'today':''}">${m.nt.due?fmtD(m.nt.due):''}</span> ${esc(m.nt.title)}</div>`:'<div class="ameta" style="margin-top:6px;color:var(--t4)">No next action</div>'}</div>`;}).join('')}</div>`;
  }else{
    const rows=list.map(c=>{const m=meta(c);const na=m.nt?esc(m.nt.title):'<span style="color:var(--t4)">—</span>';
      const nad=m.nt&&m.nt.due?`<span class="due ${m.nt.due<td?'over':m.nt.due===td?'today':''}">${fmtD(m.nt.due)}</span>`:'';
      return`<tr class="click" onclick="nav('accounts','${c.id}')"><td style="font-weight:600;color:var(--blue-d)">${esc(c.name)}</td><td>${c.kam_id?esc(pname(c.kam_id)):'<span style="color:var(--t4)">—</span>'}</td><td>${esc(c.segment||'')}</td><td>${esc(c.city||'')}</td><td>${na} ${nad}</td><td class="r num">${m.dls?m.dls+' · '+fmtMoney(m.dv):'—'}</td><td class="r num">${m.open||'—'}</td></tr>`;}).join('');
    body=`<div class="card" style="overflow-x:auto"><table class="t"><tr>${sortHead('accounts','name','Account')}${sortHead('accounts','kam','KAM')}${sortHead('accounts','segment','Segment')}${sortHead('accounts','city','City')}${sortHead('accounts','na','Next action')}${sortHead('accounts','deals','Open deals','r')}${sortHead('accounts','open','Open items','r')}</tr>${rows}</table></div>`;
  }
  return pagehead('CRM','Accounts',CU().length+' accounts',`<button class="btn sm" onclick="openCust()">+ Account</button>`)+filters+body;}

function acctPage(c){const td=today();const cos=CO().filter(x=>x.customer_id===c.id);
  const open=T().filter(t=>t.customer_id===c.id&&t.status!=='done').sort((a,b)=>((a.due||a.when||'9')+'').localeCompare((b.due||b.when||'9')+''));
  const dls=DL().filter(d=>d.customer_id===c.id);
  const acts=AC().filter(a=>a.customer_id===c.id).sort((a,b)=>(b.at||'').localeCompare(a.at||'')).slice(0,25);
  const meets=M().filter(m=>m.customer_id===c.id&&m.status!=='done');
  const nm=esc(c.name);
  return`<span class="backlink" onclick="nav('accounts')">← Accounts</span>`+
  pagehead('ACCOUNT',nm,`${esc(c.segment||'')}${c.segment&&c.city?' · ':''}${esc(c.city||'')}${c.kam_id?' · KAM: '+personLink(c.kam_id,'pill b'):''}${c.address?' · '+esc(c.address):''}`,
    `<button class="btn gh2 sm" onclick="openCust('${c.id}')">Edit</button><button class="btn gh2 sm" onclick="openTask(null,null,null,'${c.id}','call')">+ Call</button><button class="btn gh2 sm" onclick="openDeal(null,'${c.id}')">+ Deal</button><button class="btn sm" onclick="openTask(null,null,null,'${c.id}')">+ Task</button>`)+
  nextActionCard(c)+
  `${c.cadence?`<div class="card" style="border-left:4px solid ${supplyLapsed(c)?'var(--red)':supplyDue(c)?'var(--amb)':'var(--grn)'}"><div class="ch"><span>Supply — ${esc(c.cadence)}</span>${c.last_order?`<span class="due ${supplyLapsed(c)?'over':''}">last order ${fmtD(c.last_order)} · ${ageDays(c.last_order)}d ago</span>`:'<span class="pill a">no order logged</span>'}</div>
    <div class="cb" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><div style="flex:1;font-size:12.5px;color:var(--t2)">${esc(c.supply_note||'')}${supplyLapsed(c)?' <b style="color:var(--red)">— overdue to reorder</b>':supplyDue(c)?' <b style="color:var(--amb)">— due to reorder</b>':''}</div><button class="btn sm" onclick="logOrderToday('${c.id}')">Log order today</button></div></div>`:''}
  <div class="grid31"><div>

const RTE_OK=new Set(['B','STRONG','I','EM','U','A','UL','OL','LI','BR','DIV','P','SPAN','FONT']);
const RTE_STYLE_OK={'color':/^#[0-9a-f]{3,6}$|^rgb\(/i,'background-color':/^#[0-9a-f]{3,6}$|^rgb\(/i,'text-align':/^(left|right|center|justify)$/i,'font-weight':/^(bold|[1-9]00)$/i,'font-style':/^italic$/i,'text-decoration':/underline|line-through/i};
function safeStyle(el){const out=[];const st=el.getAttribute&&el.getAttribute('style');if(st){st.split(';').forEach(pair=>{const i=pair.indexOf(':');if(i<0)return;const k=pair.slice(0,i).trim().toLowerCase();const v=pair.slice(i+1).trim();if(RTE_STYLE_OK[k]&&RTE_STYLE_OK[k].test(v))out.push(k+':'+v);});}return out.join(';');}
function sanitizeHtml(html){const d=document.createElement('div');d.innerHTML=html;
  (function walk(node){[...node.childNodes].forEach(ch=>{
    if(ch.nodeType===1){
      if(!RTE_OK.has(ch.tagName)){const t=document.createTextNode(ch.textContent);ch.replaceWith(t);return;}
      const href=ch.tagName==='A'?ch.getAttribute('href'):null;
      const color=ch.tagName==='FONT'?ch.getAttribute('color'):null;
      const sty=safeStyle(ch);
      [...ch.attributes].forEach(a=>ch.removeAttribute(a.name));
      if(sty)ch.setAttribute('style',sty);
      if(ch.tagName==='A'&&href&&/^https?:|^mailto:/i.test(href)){ch.setAttribute('href',href);ch.setAttribute('target','_blank');ch.setAttribute('rel','noopener');}
      if(ch.tagName==='FONT'&&color&&/^#[0-9a-f]{3,6}$/i.test(color))ch.setAttribute('color',color);
      walk(ch);
    }else if(ch.nodeType===8){ch.remove();}
  });})(d);
  return d.innerHTML;}
function htmlToText(html){const d=document.createElement('div');d.innerHTML=html;return (d.textContent||'').replace(/\n{2,}/g,'\n').trim();}

async function trDel(id){const r=toolruns.find(x=>x.id===id);if(r&&await askConfirm('Delete this exercise?',{ok:'Delete',danger:true})){r.deleted=true;r.updated_at=now();persist();renderView();toast('Deleted.');}}

/* matrix */

function vMatrix(){const s=mtxState();

    ${totals[win]>0?`<button class="btn gh2 sm" onclick="fileMatrixDecision()">File as decision → log</button>`:''}</div>
  ${totals[win]>0?`<div class="note" style="margin-top:10px"><b>${esc(s.options[win])}</b> leads with ${totals[win]} points. If a small weight change flips the winner, the call is close — discuss the intangibles.</div>`:''}

function csvEsc(v){v=v==null?'':String(v);return/[",\n;]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function toCsv(rows){return'\uFEFF'+rows.map(r=>r.map(csvEsc).join(',')).join('\r\n');}
function dlCsv(name,rows){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([toCsv(rows)],{type:'text/csv;charset=utf-8'}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1500);}
function parseCsv(text){text=text.replace(/^\uFEFF/,'');
  const firstLine=text.split(/\r?\n/)[0]||'';
  const delim=(firstLine.split(';').length>firstLine.split(',').length)?';':',';
  const rows=[];let row=[],cur='',inQ=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(inQ){if(ch==='"'){if(text[i+1]==='"'){cur+='"';i++;}else inQ=false;}else cur+=ch;}
    else if(ch==='"')inQ=true;
    else if(ch===delim){row.push(cur);cur='';}
    else if(ch==='\n'||ch==='\r'){if(ch==='\r'&&text[i+1]==='\n')i++;row.push(cur);cur='';if(row.some(c=>c!==''))rows.push(row);row=[];}
    else cur+=ch;}
  row.push(cur);if(row.some(c=>c!==''))rows.push(row);
  return rows;}
function csvObjects(text){const rows=parseCsv(text);if(rows.length<2)return[];
  const hdr=rows[0].map(h=>h.trim().toLowerCase().replace(/[^a-z0-9_]/g,'_'));
  return rows.slice(1).map(r=>{const o={};hdr.forEach((h,i)=>o[h]=(r[i]||'').trim());return o;});}
const normD=s=>{if(!s)return null;const m=String(s).match(/(\d{4})-(\d{1,2})-(\d{1,2})/);if(m)return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  const m2=String(s).match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);if(m2)return m2[3]+'-'+m2[2].padStart(2,'0')+'-'+m2[1].padStart(2,'0');return null;};
const normT=s=>{if(!s)return null;const m=String(s).match(/(\d{1,2}):(\d{2})/);return m?m[1].padStart(2,'0')+':'+m[2]:null;};

const CSVDEFS={
tasks:{label:'Tasks & calls',cols:['title','type','owner','due','time','estimate_min','priority','department','account','status','follow_up','phone','call_when','notes'],

function dlTemplate(k){const d=CSVDEFS[k];if(!d.imp){toast('This data is export-only.');return;}const rows=[d.cols,d.example];if(d.example2)rows.push(d.example2);dlCsv('clario-template-'+k+'.csv',rows);toast('Template downloaded — fill in Excel, save as CSV, import back.');}
function dlData(k){const d=CSVDEFS[k];dlCsv('clario-'+k+'-'+today()+'.csv',[d.cols,...d.rows()]);}
function importCsvFor(k){if(!CSVDEFS[k].imp){toast('This data is export-only — it can’t be imported.');return;}const inp=document.createElement('input');inp.type='file';inp.accept='.csv,text/csv';
  inp.onchange=async e=>{const f=e.target.files[0];if(!f)return;
    try{const objs=csvObjects(await f.text());if(!objs.length){toast('No data rows found. Save the sheet as CSV and keep the header row.');return;}
      let added=0,updated=0;const skipped=[];
      objs.forEach((o,i)=>{const r=CSVDEFS[k].imp(o);if(r==='updated')updated++;else if(r)skipped.push('Row '+(i+2)+': '+r);else added++;});
      persist();renderView();
      let msg=CSVDEFS[k].label+': '+added+' added'+(updated?', '+updated+' updated':'')+(skipped.length?', '+skipped.length+' skipped':'')+'.';
      toast(msg);if(skipped.length)alert(msg+'\n\n'+skipped.slice(0,10).join('\n')+(skipped.length>10?'\n…':''));
    }catch(err){toast('Import failed: '+err.message);}};
  inp.click();}

  const wasOpen=t.status!=='done';
  t.status=t.status==='done'?(t.owner!=='me'?'waiting':'open'):'done';t.updated_at=now();
  if(wasOpen&&t.status==='done'&&t.customer_id){const who=t.contact_id?(CO().find(c=>c.id===t.contact_id)||{}).name:'';const lbl=(t.type==='call'?'Call: ':'Done: ')+t.title+(who?' — '+who:'');
    let a=activities.find(x=>x.task_id===t.id&&!x.deleted);const n2=now();
    if(a){a.text=lbl;if(t.notes_html)a.html=t.notes_html;a.kind=t.type==='call'?'call':'note';a.updated_at=n2;}
    else activities.push({id:uid(),kind:t.type==='call'?'call':'note',text:lbl,html:t.notes_html||null,task_id:t.id,customer_id:t.customer_id,deal_id:t.deal_id||null,contact_id:t.contact_id||null,at:n2,created_at:n2,updated_at:n2});}
  if(wasOpen&&t.status==='done'&&t.repeat&&REPEAT_DAYS[t.repeat]){const base=t.due||today();const nd=addDays(base,REPEAT_DAYS[t.repeat]);const n2=now();
    tasks.push({id:uid(),type:t.type,title:t.title,owner:t.owner,priority:t.priority,dept:t.dept,customer_id:t.customer_id,contact_id:t.contact_id,deal_id:t.deal_id,due:nd,original_due:nd,at:t.at,estimate_min:t.estimate_min,repeat:t.repeat,phone:t.phone,status:t.owner!=='me'?'waiting':'open',notes:t.notes,created_at:n2,updated_at:n2});
    toast('Next occurrence scheduled '+fmtD(nd)+'.');}
  persist();renderView();}
function toggleFocus(id){const t=tasks.find(x=>x.id===id);if(!t)return;if(!t.focus&&T().filter(x=>x.focus&&x.status!=='done').length>=3){toast('Three focus slots — unstar one first.');return;}t.focus=!t.focus;t.updated_at=now();persist();renderView();}

let editP=null;
function openPerson(id){editP=id?people.find(x=>x.id===id):null;

  g('pDel').style.display=editP?'':'none';g('mPerson').classList.add('open');setTimeout(()=>g('pName').focus(),50);}
function savePerson(){const name=g('pName').value.trim();if(!name){toast('Name required.');return;}const n=now();
  const d={name,dept:g('pDept').value,role:g('pRole').value.trim(),phone:g('pPhone').value.trim(),email:g('pEmail').value.trim(),notes:g('pNotes').value.trim(),updated_at:n};

async function delPerson(){if(editP&&await askConfirm('Delete '+editP.name+'? Their items stay.',{ok:'Delete',danger:true})){editP.deleted=true;editP.updated_at=now();closeM();nav('people');toast('Deleted.');}}

let editC=null;

  g('cDel').style.display=editC?'':'none';g('mCust').classList.add('open');setTimeout(()=>g('cName').focus(),50);}
function saveCust(){const nm=g('cName').value.trim();if(!nm){toast('Name required.');return;}const n=now();
  const kam=g('cKam').value;const d={name:nm,segment:g('cSeg').value.trim(),city:g('cCity').value.trim(),dept:g('cDept').value,kam_id:kam==='me'?null:kam,cadence:g('cCadence').value||'',last_order:g('cLastOrder').value||null,supply_note:g('cSupplyNote').value.trim(),address:g('cAddr').value.trim(),notes:g('cNotes').value.trim(),updated_at:n};

function editC2push(d,n){customers.push(Object.assign({id:uid(),created_at:n,next_action:null,next_action_due:null,people_ids:[]},d));}
async function quickNewKam(){const v=((await askText('New person name:',{title:'New person'}))||'').trim();if(!v)return;const n=now();const ex=P().find(p=>p.name.toLowerCase()===v.toLowerCase());const id=ex?ex.id:(people.push({id:uid(),name:v,dept:g('cDept').value||'',role:'',phone:'',created_at:n,updated_at:n}),people[people.length-1].id);persist();fillOwner('cKam',id);}
async function delCust(){if(editC&&await askConfirm('Delete '+editC.name+'? Linked items stay.',{ok:'Delete',danger:true})){editC.deleted=true;editC.updated_at=now();closeM();nav('accounts');toast('Deleted.');}}

let editDl=null;
function openDeal(id,presetCust){editDl=id?deals.find(x=>x.id===id):null;const d=editDl;
  g('mDealTitle').textContent=d?'Edit Deal':'New Deal';
  g('dlName').value=d?.name||'';
  fillCust('dlCust',d?.customer_id||presetCust||'');
  g('dlStage').innerHTML=STAGES.map(s=>`<option${(d?.stage||'Prospect')===s?' selected':''}>${s}</option>`).join('');
  g('dlValue').value=d?.value||'';g('dlClose').value=d?.close_date||'';
  fillContact('dlContact',d?.customer_id||presetCust||null,d?.contact_id||'');
  fillProd('dlProd',d?.product||'');
  window._dlLines=JSON.parse(JSON.stringify(d?.lines||[]));renderDlLines();
  g('dlNotes').value=d?.notes||'';g('dlDel').style.display=d?'':'none';
  g('dlCust').onchange=()=>fillContact('dlContact',g('dlCust').value||null,'');
  g('mDeal').classList.add('open');setTimeout(()=>g('dlName').focus(),50);}
function renderDlLines(){const box=g('dlLines');if(!box)return;const L=window._dlLines||[];
  box.innerHTML=L.map((l,i)=>`<div style="display:flex;gap:5px;margin-bottom:5px;align-items:center">
    <input list="prodList" value="${esc(l.product||'')}" placeholder="Product" style="flex:2" onchange="_dlLines[${i}].product=this.value">
    <input type="number" min="0" value="${l.qty??''}" placeholder="Qty" style="flex:1;min-width:52px" onchange="_dlLines[${i}].qty=this.value;renderDlLineTot()">
    <input type="number" min="0" value="${l.rate??''}" placeholder="Rate" style="flex:1;min-width:60px" onchange="_dlLines[${i}].rate=this.value;renderDlLineTot()">
    <button class="iconb" type="button" title="Remove" onclick="_dlLines.splice(${i},1);renderDlLines()">✕</button></div>`).join('')
    +`<datalist id="prodList">${products.map(p=>`<option value="${esc(p)}">`).join('')}</datalist>`;
  renderDlLineTot();}
function renderDlLineTot(){const t=g('dlLineTot');if(!t)return;const L=window._dlLines||[];const tot=L.reduce((a,l)=>a+(+l.qty||0)*(+l.rate||0),0);
  t.innerHTML=tot>0?`Line total: <b>${fmtMoney(tot)}</b> — this overrides the Value field on save.`:'No line items — the Value field is used.';}
function dlAddLine(){window._dlLines=window._dlLines||[];window._dlLines.push({product:'',qty:'',rate:''});renderDlLines();}
async function saveDeal(){const nm=g('dlName').value.trim();if(!nm){toast('Deal name required.');return;}const n=now();
  const st=g('dlStage').value;
  const lines=(window._dlLines||[]).filter(l=>l.product||+l.qty||+l.rate);const lineVal=lines.reduce((a,l)=>a+(+l.qty||0)*(+l.rate||0),0);const d={name:nm,customer_id:g('dlCust').value||null,stage:st,value:lineVal>0?lineVal:(+g('dlValue').value||0),close_date:g('dlClose').value||null,contact_id:g('dlContact').value||null,product:g('dlProd').value||'',lines,notes:g('dlNotes').value.trim(),updated_at:n};
  if(editDl){if(st==='Lost'&&editDl.stage!=='Lost'){const r=await askText('Why was this lost? (price, competitor, timing, no decision…)',{title:'Lost reason',ok:'Save'});d.lost_reason=(r||'').trim();}if(st==='Won'&&editDl.stage!=='Won')d.won_at=n;Object.assign(editDl,d);}
  else{deals.push(Object.assign({id:uid(),created_at:n},d));if(d.customer_id)logActivity('note','Deal created: '+nm+' ('+fmtMoney(d.value)+')',d.customer_id,null);}
  closeM();persist();renderView();}
async function delDeal(){if(editDl&&await askConfirm('Delete deal '+editDl.name+'?',{ok:'Delete',danger:true})){editDl.deleted=true;editDl.updated_at=now();closeM();nav('pipeline');toast('Deleted.');}}

let editM=null;
function openMeeting(id,presetDate){editM=id?meetings.find(x=>x.id===id):null;
  g('mMeetTitle').textContent=editM?'Edit Meeting':'New Meeting';
  g('mTitle2').value=editM?.title||'';g('mDate').value=editM?.date||presetDate||today();g('mTime').value=editM?.time||'';g('mDur').value=editM?.duration||60;

function saveMeeting(){const title=g('mTitle2').value.trim();if(!title){toast('Title required.');return;}const n=now();
  const att=[...g('mAtt').querySelectorAll('.attchip.on')].map(c=>c.dataset.id);

  g('dDel').style.display=editD?'':'none';g('mDec').classList.add('open');setTimeout(()=>g('dWhat').focus(),50);}

  const m=decMid?M().find(x=>x.id===decMid):null;

let editO=null;

  g('mOppTitle').textContent=editO?'Edit Opportunity':'Improvement Opportunity';

  fillDept('oDept',editO?.dept||'');g('oStatus').value=editO?.status||'open';g('oNotes').value=editO?.notes||'';

  const d={title:t,impact:+g('oImpact').value,effort:+g('oEffort').value,dept:g('oDept').value,status:g('oStatus').value,notes:g('oNotes').value.trim(),updated_at:n};

async function delOpp(){if(editO&&await askConfirm('Delete opportunity?',{ok:'Delete',danger:true})){editO.deleted=true;editO.updated_at=now();closeM();persist();renderView();toast('Deleted.');}}

async function quickNewContact(sel){const cid=g('tCust').value;if(!cid){toast('Pick an account first.');return;}
  const nm=((await askText('New contact name (person at this account):',{title:'New contact'}))||'').trim();if(!nm)return;
  const n=now();const id=uid();contacts.push({id,customer_id:cid,name:nm,role:'',phone:'',email:'',created_at:n,updated_at:n});
  persist();fillContact(sel,cid,id);toast('Contact added.');}
async function quickNew(kind,sel){const n=now();
  if(kind==='dept'){const v=((await askText('New department:',{title:'New department'}))||'').trim();if(!v)return;
    if(!depts.includes(v))depts.push(v);persist();fillDept(sel||'tDept',v);return;}
  if(kind==='person'){const v=((await askText('New person name:',{title:'New person'}))||'').trim();if(!v)return;
    const deptSel=sel==='tOwner'?'tDept':null;
    const ex=P().find(p=>p.name.toLowerCase()===v.toLowerCase());
    const id=ex?ex.id:(people.push({id:uid(),name:v,dept:deptSel?(g(deptSel).value||''):'',role:'',phone:'',created_at:n,updated_at:n}),people[people.length-1].id);
    persist();fillOwner(sel||'tOwner',id);if(sel==='tOwner')taskTypeUI();return;}
  if(kind==='cust'){const v=((await askText('New account name:',{title:'New account'}))||'').trim();if(!v)return;
    const id=getOrCreateAccount(v);persist();fillCust(sel||'tCust',id);
    if((sel||'tCust')==='dlCust'&&g('dlContact'))fillContact('dlContact',id,'');
    if((sel||'tCust')==='tCust'&&g('tContact'))fillContact('tContact',id,'');return;}
  if(kind==='prod'){const v=((await askText('New product / service:',{title:'New product'}))||'').trim();if(!v)return;
    if(!products.includes(v))products.push(v);persist();fillProd(sel||'dlProd',v);return;}}
function wire(){const q=g('qaInput');if(q)q.onkeydown=e=>{if(e.key==='Enter')quickAdd();};
  if(g('csvPick'))csvPickUI();
  if(g('faqQ')&&window._faqQ)faqSearch(window._faqQ);
  const ai=g('agInput');if(ai)ai.onkeydown=e=>{if(e.key==='Enter')ai.nextElementSibling.click();};
  const mo=g('mActO');if(mo)fillOwner('mActO','me');
  const tko=g('tkO');if(tko)fillOwner('tkO','me');
  wireKanban();
  const pa=g('paCv');if(pa&&window._pa){const s=window._pa;const valid=s.items.filter(i=>i.cause&&+i.count>0);drawPareto(pa,valid.map(i=>i.cause),valid.map(i=>+i.count));}
  const qc=g('quadCv');if(qc)drawQuad(qc,OP());
  const tc=g('trendCv');if(tc){const td=today();const labels=[],done=[],added=[];
    for(let w=7;w>=0;w--){const s=addDays(mondayOf(td),-7*w),e=addDays(s,7);labels.push(fmtD(s));
      done.push(T().filter(t=>t.status==='done'&&(t.updated_at||'').slice(0,10)>=s&&(t.updated_at||'').slice(0,10)<e).length);
      added.push(T().filter(t=>(t.created_at||'').slice(0,10)>=s&&(t.created_at||'').slice(0,10)<e).length);}
    drawTrend(tc,labels,done,added);}
  const dc=g('deptCv');if(dc){const td=today();const m={};T().filter(t=>t.status!=='done'&&t.type!=='call'&&t.due&&t.due<td).forEach(t=>{m[t.dept||'—']=(m[t.dept||'—']||0)+1;});
    const ks=Object.keys(m);if(ks.length)drawBars(dc,ks,ks.map(k=>m[k]),'#ba0517');else{const c=dc.getContext('2d');dc.width=dc.clientWidth*2;dc.height=dc.clientHeight*2;c.font='600 20px Inter';c.fillStyle='#939393';c.textAlign='center';c.fillText('No overdue items — clean board.',dc.width/2,dc.height/2);}}
  const sc=g('stageCv');if(sc){const vals=STAGES.slice(0,4).map(st=>Math.round(DL().filter(d=>d.stage===st).reduce((a,d)=>a+(+d.value||0),0)/1000));
    drawBars(sc,STAGES.slice(0,4),vals,'#0176d3');}
}
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&(e.key==='k'||e.key==='K')){e.preventDefault();g('ghSearch').focus();return;}
  // single-key shortcuts only when not typing and no modifier
  const t=e.target,tag=(t&&t.tagName||'').toLowerCase();
  if(tag==='input'||tag==='textarea'||tag==='select'||(t&&t.isContentEditable)||e.ctrlKey||e.metaKey||e.altKey)return;
  const anyModal=[...document.querySelectorAll('.ovl.open')].length>0;if(anyModal)return;
  switch(e.key){
    case '/': e.preventDefault();g('ghSearch').focus();break;
    case 't': e.preventDefault();openTask();break;
    case 'c': e.preventDefault();openTask(null,null,null,null,'call');break;
    case 'm': e.preventDefault();openMeeting&&openMeeting();break;
    case 'a': e.preventDefault();openCust&&openCust();break;
    case 'p': e.preventDefault();openPerson&&openPerson();break;
    case '?': e.preventDefault();nav('help');break;
    case 'g': e.preventDefault();nav('home');break;
    case 'l': e.preventDefault();nav('planner');break;
    case 'k': e.preventDefault();nav('tasks');break;
  }});

/* tool state reset when leaving decide */
const _origNav=nav;
nav=async function(v,arg){if(v!=='decide'){dTool=null;window._trId=null;window._mtx=null;window._pm=null;window._fw=null;window._pa=null;window._sw=null;}return _origNav(v,arg);};

(function boot(){loadLS();renderView();restoreFolder();gRestore();
try{if(typeof matchMedia==='function'&&matchMedia('(max-width:840px)').matches)g('ghSearch').placeholder='Search everything…';}catch(e){}})();
