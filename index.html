<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Clario One</title>
<meta name="theme-color" content="#f3f2f2">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Clario One">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<script>if('serviceWorker'in navigator&&location.protocol==='https:')navigator.serviceWorker.register('./sw.js').catch(()=>{});</script>
<script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f3f2f2; --card:#ffffff; --sub:#fafaf9; --bdr:#e5e5e5; --bdr2:#c9c9c9;
  --t1:#181818; --t2:#444444; --t3:#706e6b; --t4:#939393;
  --blue:#0176d3; --blue-d:#014486; --blue-l:#eef4ff; --blue-b:#aacbff;
  --grn:#2e844a; --grn-l:#ebf7ee; --red:#ba0517; --red-l:#feefef;
  --amb:#dd7a01; --amb-l:#fef4e8; --pur:#9050e9; --pur-l:#f4ecfe;
  --r:6px; --rs:4px; --sh:0 2px 4px rgba(24,24,24,.06);
  --font:'Inter',system-ui,-apple-system,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);font-size:13px;line-height:1.5;color:var(--t1);background:var(--bg);-webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit;font-size:13px}
input,select,textarea{font-family:var(--font);font-size:13px;color:var(--t1);background:#fff;border:1px solid var(--bdr2);border-radius:var(--rs);padding:7px 10px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(1,118,211,.25)}
.num{font-variant-numeric:tabular-nums}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:#c9c9c9;border-radius:3px}::-webkit-scrollbar-track{background:transparent}

/* ═══ global header ═══ */
#gh{height:auto;min-height:50px;padding-top:calc(env(safe-area-inset-top,0px));background:#fff;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:14px;padding:0 16px;position:sticky;top:0;z-index:40}
.gh-brand{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;letter-spacing:-.2px;white-space:nowrap}
.gh-logo{width:26px;height:26px;border-radius:6px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.gh-search{flex:1;max-width:560px;position:relative}
.gh-search input{width:100%;padding:7px 12px 7px 32px;background:var(--bg);border-color:transparent;border-radius:var(--r)}
.gh-search input:focus{background:#fff;border-color:var(--blue)}
.gh-search .mag{position:absolute;left:10px;top:8px;color:var(--t3)}
.gh-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.gh-sync{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t3);padding:5px 8px;border-radius:var(--rs)}
.gh-sync:hover{background:var(--bg)}
.sdot{width:11px;height:11px;border-radius:50%;background:var(--t4)}
.sdot.ok{background:var(--grn)}.sdot.err{background:var(--red)}.sdot.busy{background:var(--blue);animation:pulse 1.2s infinite}
@keyframes pulse{50%{opacity:.35}}
#stxt{display:none}
#srchres{position:absolute;top:38px;left:0;right:0;background:#fff;border:1px solid var(--bdr);border-radius:var(--r);box-shadow:0 8px 24px rgba(24,24,24,.14);max-height:380px;overflow:auto;display:none;z-index:60}
#askChoices .ckrow{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--bdr);border-radius:6px;font-size:13px;cursor:pointer}
#askChoices .ckrow:hover{background:var(--sub)}
#askChoices .ckrow input{width:16px;height:16px}
#srchres.on{display:block}
#srchres .sr-item.sel{background:var(--blue-l)}
.sr-item{padding:8px 12px;display:flex;gap:9px;align-items:center;cursor:pointer;font-size:13px}
.sr-item:hover{background:var(--blue-l)}
.sr-k{font-size:10px;font-weight:700;letter-spacing:.05em;color:#fff;border-radius:3px;padding:1px 5px;min-width:34px;text-align:center}
.sr-k.T{background:var(--blue)}.sr-k.A{background:var(--pur)}.sr-k.D{background:var(--grn)}.sr-k.P{background:var(--amb)}.sr-k.M{background:#5867e8}

/* ═══ nav tabs ═══ */
#navbar{background:#fff;border-bottom:1px solid var(--bdr);display:flex;align-items:stretch;padding:0 10px;overflow-x:auto;position:sticky;top:calc(50px + env(safe-area-inset-top,0px));z-index:39;-webkit-overflow-scrolling:touch}
.ngrp{display:none}
#moremenu{position:fixed;right:8px;top:calc(50px + env(safe-area-inset-top,0px) + 44px);background:#fff;border:1px solid var(--bdr);border-radius:var(--r);box-shadow:0 8px 24px rgba(24,24,24,.14);display:none;min-width:200px;max-height:70vh;overflow-y:auto;z-index:120;padding:5px}
#moremenu.on{display:block}
.nm-h{font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--t4);padding:6px 12px 2px}
.nm-i.sel{background:var(--blue-l);color:var(--blue-d);font-weight:700}
.nt{padding:11px 15px;font-size:13px;font-weight:600;color:var(--t2);border-bottom:3px solid transparent;white-space:nowrap;display:flex;gap:6px;align-items:center}
.nt:hover{color:var(--t1);background:var(--sub)}
.nt.on{color:var(--blue-d);border-bottom-color:var(--blue)}
.nt .bdg{font-size:11px;background:var(--bg);border-radius:8px;padding:0 6px;color:var(--t2)}
.nt .bdg.hot{background:var(--red-l);color:var(--red)}

#main{padding:18px;max-width:1280px;margin:0 auto}

/* ═══ page & cards ═══ */
.ph{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;box-shadow:var(--sh)}
.ph-l .crumb{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.ph-l h2{font-size:19px;font-weight:800;letter-spacing:-.2px;display:flex;align-items:center;gap:9px}
.ph-l .sub{font-size:12.5px;color:var(--t3);margin-top:1px}
.ph-r{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{background:var(--blue);color:#fff;font-weight:600;padding:7px 14px;border-radius:var(--rs)}
.btn:hover{background:var(--blue-d)}
.btn.gh2{background:#fff;color:var(--blue);border:1px solid var(--bdr2);font-weight:500}
.btn.gh2:hover{background:var(--blue-l)}
.btn.dg{background:#fff;color:var(--red);border:1px solid var(--bdr2)}
.btn.dg:hover{background:var(--red-l)}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.xs{padding:2px 8px;font-size:11.5px}
.card{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:14px}
.ch{padding:10px 14px;border-bottom:1px solid var(--bdr);font-size:12.5px;font-weight:700;color:var(--t1);display:flex;align-items:center;justify-content:space-between;gap:8px}
.ch .n{color:var(--t3);font-weight:600}
.cb{padding:12px 14px}
.empty{padding:18px;text-align:center;color:var(--t4);font-size:12.5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid31{display:grid;grid-template-columns:2fr 1fr;gap:14px}
@media(max-width:900px){.grid2,.grid31{grid-template-columns:1fr}}

/* ═══ tables ═══ */
table.t{width:100%;border-collapse:collapse;font-size:12.5px}
table.t th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--t3);padding:8px 12px;background:var(--sub);border-bottom:1px solid var(--bdr);font-weight:700;white-space:nowrap}
table.t td{padding:8px 12px;border-bottom:1px solid var(--bdr);vertical-align:top}
table.t tr:last-child td{border-bottom:0}
table.t tr.click{cursor:pointer}
.lnk{cursor:pointer;text-decoration:none}.lnk:hover{text-decoration:underline;filter:brightness(.92)}
table.t tr.click:hover{background:var(--blue-l)}
table.t td.r,table.t th.r{text-align:right}
.pill{font-size:11px;border-radius:10px;padding:1px 8px;font-weight:600;white-space:nowrap}
.pill.b{background:var(--blue-l);color:var(--blue-d)}
.pill.g{background:var(--grn-l);color:var(--grn)}
.pill.r{background:var(--red-l);color:var(--red)}
.pill.a{background:var(--amb-l);color:var(--amb)}
.pill.p{background:var(--pur-l);color:var(--pur)}
.pill.n{background:var(--bg);color:var(--t2)}

/* ═══ rows ═══ */
.row{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px solid var(--bdr)}
.row:last-child{border-bottom:0}
.row:hover{background:var(--sub)}
.chk{width:16px;height:16px;border:1.5px solid var(--bdr2);border-radius:3px;flex:0 0 auto;margin-top:2px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;background:#fff}
.chk.on{background:var(--grn);border-color:var(--grn)}
.row .bd{flex:1;min-width:0}
.row .tt{font-weight:600;font-size:13px}
.row.done .tt{text-decoration:line-through;color:var(--t3);font-weight:400}
.meta{display:flex;flex-wrap:wrap;gap:4px 8px;margin-top:3px;font-size:11.5px;color:var(--t3);align-items:center}
.pri{width:7px;height:7px;border-radius:50%;flex:0 0 auto;margin-top:8px}
.pri.high{background:var(--red)}.pri.medium{background:var(--amb)}.pri.low{background:var(--t4)}
.due.over{color:var(--red);font-weight:700}.due.today{color:var(--blue-d);font-weight:700}
.age{font-size:10.5px;color:var(--red);font-weight:700}
.star{font-size:14px;color:var(--bdr2);padding:1px 4px}
.star.on{color:var(--amb)}
.iconb{color:var(--t4);font-size:13px;padding:2px 5px;border-radius:4px}
.iconb:hover{background:var(--bg);color:var(--t1)}
.rowacts{display:flex;gap:1px;opacity:0}
.row:hover .rowacts{opacity:1}
.telbtn{color:var(--grn);font-weight:700;font-size:11.5px}
.addline{display:flex;gap:6px;padding:9px 12px;border-top:1px solid var(--bdr);flex-wrap:wrap;background:var(--sub)}
.rte{min-height:64px;border:1px solid var(--bdr);border-radius:6px;padding:8px 10px;font-size:12.5px;background:#fff;outline:none;line-height:1.5}
.rte ul,.rte ol{margin:4px 0;padding-left:22px}.rte li{margin:2px 0}
.rte ul{list-style:disc}.rte ol{list-style:decimal}
.rte:focus{border-color:var(--blue)}
.rte:empty::before{content:attr(data-ph);color:var(--t4)}
.rte-tb{display:flex;gap:3px;margin-bottom:6px;flex-wrap:wrap;align-items:center}
.rte-tb button{border:1px solid var(--bdr);border-radius:5px;padding:3px 8px;font-size:12px;background:#fff;min-width:28px;line-height:1.2}
.rte-tb button:hover{background:var(--bg)}
.rte-sep{width:1px;align-self:stretch;background:var(--bdr);margin:2px 3px}
.rte-dd{position:relative;display:inline-flex}
.rte-pop{position:absolute;top:100%;left:0;margin-top:3px;background:#fff;border:1px solid var(--bdr);border-radius:6px;box-shadow:0 6px 18px rgba(24,24,24,.16);padding:6px;z-index:75;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;width:132px}
.rte-pop .sw{width:24px;height:24px;min-width:0;padding:0;border:1px solid var(--bdr);border-radius:5px;cursor:pointer}
.rte ul,.rte ol{margin:4px 0;padding-left:22px}.rte li{margin:2px 0}
.rte ul{list-style:disc}.rte ul ul{list-style:circle}.rte ul ul ul{list-style:square}
.rte ol{list-style:decimal}.rte ol ol{list-style:lower-alpha}.rte ol ol ol{list-style:lower-roman}
.rte blockquote{margin:4px 0 4px 16px;padding-left:10px;border-left:3px solid var(--bdr)}
.at-t ul,.at-t ol{margin:3px 0;padding-left:20px}.at-t li{margin:1px 0}.at-t ul{list-style:disc}.at-t ul ul{list-style:circle}.at-t ol{list-style:decimal}.at-t ol ol{list-style:lower-alpha}
.at-li{display:flex;align-items:flex-start;gap:6px}
.at-li .mk{flex:1}
.at-li .lit{opacity:0;font-size:11px;padding:0 5px;border:1px solid var(--bdr);border-radius:4px;white-space:nowrap;align-self:center}
.at-li:hover .lit{opacity:1}
.addline input,.addline select{flex:1;min-width:100px;font-size:12.5px;padding:6px 8px}

/* ═══ KPI ═══ */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:12px;margin-bottom:14px}
.kpi{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;cursor:pointer;box-shadow:var(--sh);border-top:3px solid var(--bdr2)}
.kpi:hover{border-color:var(--blue-b);border-top-color:var(--blue)}
.kpi .kv{font-size:22px;font-weight:800;letter-spacing:-.4px}
.kpi .kl{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);font-weight:700;margin-top:1px}
.kpi.bad{border-top-color:var(--red)}.kpi.bad .kv{color:var(--red)}
.kpi.warn{border-top-color:var(--amb)}.kpi.warn .kv{color:var(--amb)}
.kpi.good{border-top-color:var(--grn)}.kpi.good .kv{color:var(--grn)}
.kpi.blue{border-top-color:var(--blue)}.kpi.blue .kv{color:var(--blue-d)}

/* ═══ tabs & filters ═══ */
.tabs{display:flex;gap:0;margin-bottom:14px;border-bottom:2px solid var(--bdr);flex-wrap:wrap}
.tab{padding:8px 15px;font-size:13px;font-weight:600;color:var(--t3);border-bottom:3px solid transparent;margin-bottom:-2px}
.tab:hover{color:var(--t1)}
.tab.on{color:var(--blue-d);border-bottom-color:var(--blue)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.filters select,.filters input{font-size:12.5px;padding:6px 9px}
th.srt{cursor:pointer;user-select:none;white-space:nowrap}th.srt:hover{color:var(--blue-d)}th.srt .ar{opacity:.5;font-size:10px}
.vtog{display:inline-flex;border:1px solid var(--bdr);border-radius:6px;overflow:hidden;margin-left:auto}
.vtog button{padding:5px 11px;font-size:12px;background:#fff;color:var(--t3)}
.vtog button.on{background:var(--blue);color:#fff}
.acard{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:13px;cursor:pointer;box-shadow:var(--sh)}
.acard:hover{border-color:var(--blue-b)}
.acard .an{font-weight:700;font-size:13.5px;color:var(--blue-d)}
.acard .ameta{font-size:11.5px;color:var(--t3);margin-top:2px}
.acard .astats{display:flex;gap:12px;margin-top:8px;font-size:11.5px;color:var(--t2);flex-wrap:wrap}

/* ═══ planner: month ═══ */
.pl-nav{display:flex;align-items:center;gap:6px}
.pl-title{font-size:14px;font-weight:800;min-width:150px;text-align:center}
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;background:var(--bdr)}
.mg-h{background:var(--sub);padding:6px 4px;text-align:center;font-size:10px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;color:var(--t3)}
.mg-c{background:#fff;min-height:92px;padding:5px 6px;cursor:pointer;font-size:11px}
.mg-c:hover{background:var(--blue-l)}
.mg-c.dim{background:var(--sub);color:var(--t4)}
.mg-c.sel{outline:2px solid var(--blue);outline-offset:-2px}
.mg-c .dn{font-size:11.5px;font-weight:700;color:var(--t2);margin-bottom:3px}
.mg-c.todaycell .dn{color:#fff;background:var(--blue);border-radius:50%;width:19px;height:19px;display:inline-flex;align-items:center;justify-content:center}
.mg-it{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:1px 5px;border-radius:3px;margin-bottom:2px;font-weight:500}
.mg-it.t{background:var(--bg);color:var(--t2)}
.mg-it.m{background:var(--blue-l);color:var(--blue-d)}
.mg-it.c{background:var(--grn-l);color:var(--grn)}
.mg-it.ov{background:var(--red-l);color:var(--red)}
.mg-more{font-size:9.5px;color:var(--t4)}

/* ═══ planner: week ═══ */
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.wcol{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);min-height:200px;display:flex;flex-direction:column;box-shadow:var(--sh)}
.wcol.todaycol{border-color:var(--blue);border-top:3px solid var(--blue)}
.wc-h{padding:7px 10px;border-bottom:1px solid var(--bdr);font-size:10.5px;font-weight:700;color:var(--t3);letter-spacing:.05em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;background:var(--sub)}
.wc-h .dn{font-size:14px;color:var(--t1)}
.wcol.todaycol .wc-h .dn{color:var(--blue-d)}
.wc-b{padding:6px 8px;flex:1}
.wc-it{font-size:11.5px;padding:4px 7px;border-radius:4px;margin-bottom:4px;cursor:pointer;font-weight:500;background:var(--bg);border:1px solid var(--bdr)}
.wc-it:hover{border-color:var(--blue-b)}
.wc-it.m{background:var(--blue-l);color:var(--blue-d);border-color:transparent}
.wc-it.c{background:var(--grn-l);color:var(--grn);border-color:transparent}
.wc-it.ov{background:var(--red-l);color:var(--red);border-color:transparent}
.wc-it.done{opacity:.5;text-decoration:line-through}
.wc-add{border-top:1px solid var(--bdr);padding:5px}
.wc-add input{width:100%;font-size:11.5px;padding:4px 7px;border-color:var(--bdr)}

/* ═══ planner: day ═══ */
.tl{position:relative;border:1px solid var(--bdr);border-radius:var(--r);background:#fff;overflow:hidden}
.tl-hr{display:flex;height:46px;border-bottom:1px solid var(--bdr)}
.tl-hr:last-child{border-bottom:0}
.tl-lbl{width:54px;min-width:54px;font-size:10.5px;color:var(--t4);padding:3px 8px 0 0;text-align:right;border-right:1px solid var(--bdr);font-weight:600}
.tl-blocks{position:absolute;top:0;left:56px;right:6px;bottom:0}
.tl-b{position:absolute;left:0;right:0;border-radius:4px;padding:3px 8px;font-size:11.5px;font-weight:600;overflow:hidden;cursor:pointer;border:1px solid}
.tl-b .sub2{font-weight:400;font-size:10.5px;opacity:.85}
.tl-b.m{background:var(--blue-l);color:var(--blue-d);border-color:var(--blue-b)}
.tl-b.c{background:var(--grn-l);color:var(--grn);border-color:#bfe3cd}
.tl-b.t{background:var(--bg);color:var(--t2);border-color:var(--bdr2)}
.tl-b.done{opacity:.45;text-decoration:line-through}
.tl-now{position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:5}
.tl-now::before{content:"";position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:var(--red)}
.capbar{height:8px;border-radius:4px;background:var(--bg);overflow:hidden;margin-top:6px}
.capbar>div{height:100%;background:var(--grn)}
.capbar.over>div{background:var(--red)}
.top3-it{display:flex;gap:8px;align-items:flex-start;padding:7px 12px;border-bottom:1px solid var(--bdr)}
.top3-it .rank{width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto}

/* ═══ kanban pipeline ═══ */
.kwrap{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;align-items:flex-start}
.kcol{background:var(--sub);border:1px solid var(--bdr);border-radius:var(--r);min-width:218px;width:218px;flex:0 0 auto}
.kc-h{padding:9px 12px;border-bottom:1px solid var(--bdr);font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:baseline;background:#fff;border-radius:var(--r) var(--r) 0 0;border-top:3px solid var(--blue)}
.kcol[data-stage="Won"] .kc-h{border-top-color:var(--grn)}
.kcol[data-stage="Lost"] .kc-h{border-top-color:var(--red)}
.kc-h .kv2{font-size:11px;color:var(--t3);font-weight:600}
.kc-b{padding:8px;min-height:60px}
.kcard{background:#fff;border:1px solid var(--bdr);border-radius:var(--rs);padding:8px 10px;margin-bottom:8px;cursor:grab;box-shadow:var(--sh);font-size:12px}
.kcard:hover{border-color:var(--blue-b)}
.kcard .kn{font-weight:700;color:var(--blue-d);cursor:pointer}
.kcard .kn:hover{text-decoration:underline}
.kcard .km{color:var(--t3);font-size:11px;margin-top:2px;display:flex;justify-content:space-between;gap:6px}
.kcard.stale{border-left:3px solid var(--amb)}
.kcol.dragover{outline:2px dashed var(--blue);outline-offset:-4px}

/* ═══ sales path ═══ */
.path{display:flex;gap:2px;margin:4px 0 2px;flex-wrap:nowrap;overflow-x:auto}
.path li{list-style:none;flex:1;min-width:86px;background:var(--bg);color:var(--t2);font-size:11.5px;font-weight:700;text-align:center;padding:7px 4px 7px 14px;position:relative;cursor:pointer;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 50%,calc(100% - 10px) 100%,0 100%,10px 50%)}
.path li:first-child{clip-path:polygon(0 0,calc(100% - 10px) 0,100% 50%,calc(100% - 10px) 100%,0 100%)}
.path li.done{background:var(--blue-d);color:#fff}
.path li.cur{background:var(--blue);color:#fff}
.path li.lostli.cur{background:var(--red)}
.path li:hover{filter:brightness(.96)}

/* ═══ activity timeline ═══ */
.atl{position:relative;padding-left:20px}
.atl::before{content:"";position:absolute;left:7px;top:4px;bottom:4px;width:2px;background:var(--bdr)}
.atl-it{position:relative;padding:0 0 12px 0}
.atl-it::before{content:"";position:absolute;left:-17px;top:4px;width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid var(--blue)}
.atl-it.k-call::before{border-color:var(--grn)}
.atl-it.k-note::before{border-color:var(--amb)}
.atl-it.k-meeting::before{border-color:var(--pur)}
.atl-it .at-t{font-size:12.5px;font-weight:600}
.atl-it .at-m{font-size:11px;color:var(--t3)}
.atl-it .at-acts{position:absolute;top:0;right:0;display:flex;gap:3px;opacity:0}
.atl-it:hover .at-acts{opacity:1}
.at-acts .lit{font-size:11px;padding:1px 6px;border:1px solid var(--bdr);border-radius:4px;background:#fff}

/* ═══ decide tools ═══ */
.toolgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:12px}
.toolcard{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:14px;cursor:pointer;box-shadow:var(--sh);border-top:3px solid var(--blue)}
.toolcard:hover{border-color:var(--blue-b)}
.toolcard h4{font-size:13.5px;font-weight:700;margin-bottom:3px}
.toolcard p{font-size:11.5px;color:var(--t3);line-height:1.45}
.mtx{width:100%;border-collapse:collapse;font-size:12px}
.mtx th,.mtx td{border:1px solid var(--bdr);padding:5px 7px;text-align:center}
.mtx th{background:var(--sub);font-size:11px}
.mtx input{width:100%;border:none;text-align:center;padding:3px;background:transparent}
.mtx input:focus{background:var(--blue-l);box-shadow:none}
.mtx .win{background:var(--grn-l);font-weight:800}
.swotg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.swotg .sq h5{font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;margin-bottom:5px}
.swotg textarea{width:100%;min-height:110px;font-size:12.5px}
.quad{position:relative;border:1px solid var(--bdr);border-radius:var(--r);background:#fff}
canvas{display:block;max-width:100%}

/* ═══ people/account cards ═══ */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:12px}
.pcard{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:13px;cursor:pointer;box-shadow:var(--sh)}
.pcard:hover{border-color:var(--blue-b)}
.pcard .pn{font-weight:700;font-size:13.5px;color:var(--blue-d)}
.pcard .pr{font-size:11.5px;color:var(--t3);margin-bottom:8px}
.pstats{display:flex;gap:10px;font-size:11.5px;color:var(--t3);flex-wrap:wrap}
.pstats b{color:var(--t1);font-weight:700}
.pstats .warn b{color:var(--amb)}
.pstats .bad b{color:var(--red)}
.dl{display:grid;grid-template-columns:110px 1fr;gap:3px 10px;font-size:12.5px;padding:12px 14px}
.dl dt{color:var(--t3)}
.dl dd{font-weight:500}
.backlink{font-size:12px;color:var(--t3);margin-bottom:10px;display:inline-flex;gap:5px;cursor:pointer}
.backlink:hover{color:var(--blue)}
.attlist{display:flex;flex-wrap:wrap;gap:6px}
.attchip{display:flex;align-items:center;gap:5px;background:var(--sub);border:1px solid var(--bdr2);border-radius:12px;padding:3px 10px;font-size:12px;cursor:pointer;user-select:none}
.attchip.on{background:var(--blue-l);border-color:var(--blue);color:var(--blue-d);font-weight:600}
.mrow{display:flex;gap:12px;padding:10px 14px;border-bottom:1px solid var(--bdr);cursor:pointer;align-items:center}
.mrow:hover{background:var(--blue-l)}
.mrow:last-child{border-bottom:0}
.mwhen{min-width:80px}
.mwhen .md{font-weight:700;font-size:13px}
.mwhen .mt{font-size:11px;color:var(--t3)}
.mrow .mtitle{font-weight:600;color:var(--blue-d)}
.mrow .msub{font-size:11.5px;color:var(--t3);margin-top:1px}

/* ═══ modal ═══ */
.ovl{position:fixed;inset:0;background:rgba(24,24,24,.45);display:none;align-items:flex-start;justify-content:center;padding:44px 16px;z-index:70;overflow:auto}
.ovl.open{display:flex}
.modal{background:#fff;border-radius:8px;width:100%;max-width:540px;box-shadow:0 16px 48px rgba(24,24,24,.3);display:flex;flex-direction:column;max-height:92vh;max-height:92dvh}
.modal h3{font-size:15px;font-weight:800;padding:14px 40px;border-bottom:1px solid var(--bdr);text-align:center;position:relative;flex:0 0 auto}
.mx{position:absolute;right:8px;top:9px;color:var(--t3);font-size:16px;padding:5px 9px;border-radius:5px}
.mx:hover{background:var(--bg);color:var(--t1)}
.mbody{padding:16px 18px;overflow-y:auto;flex:1 1 auto}
.fld{margin-bottom:11px}
.fld label{display:block;font-size:11px;color:var(--t3);font-weight:600;margin-bottom:4px}
.fld label .req{color:var(--red)}
.fld input,.fld select,.fld textarea{width:100%}
.fld textarea{min-height:56px;resize:vertical}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.macts{display:flex;justify-content:space-between;padding:12px 18px;border-top:1px solid var(--bdr);gap:8px;background:var(--sub);border-radius:0 0 8px 8px;flex:0 0 auto}
.macts .rr{display:flex;gap:8px;margin-left:auto}

/* ═══ settings ═══ */
.setcard{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:15px;margin-bottom:12px;box-shadow:var(--sh)}
.setcard h4{font-size:13px;font-weight:700;margin-bottom:8px}
.note{font-size:11.5px;color:var(--t3);line-height:1.55;margin-top:6px}
.srow{display:flex;justify-content:space-between;font-size:12.5px;padding:3px 0;color:var(--t2)}
.srow b{color:var(--t1)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.chip{background:var(--sub);border:1px solid var(--bdr2);border-radius:12px;padding:2px 9px;font-size:12px;display:flex;gap:6px;align-items:center}
.chip button{color:var(--t4);font-size:11px}
.chip button:hover{color:var(--red)}

#newmenu{position:absolute;right:0;top:36px;background:#fff;border:1px solid var(--bdr);border-radius:var(--r);box-shadow:0 8px 24px rgba(24,24,24,.14);display:none;min-width:190px;z-index:65;padding:4px}
#newmenu.on{display:block}
.nm-i{display:block;width:100%;text-align:left;padding:8px 12px;font-size:13px;border-radius:4px;font-weight:500}
.nm-i:hover{background:var(--blue-l)}
.nm-h{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--t4);padding:6px 12px 2px;font-weight:700}
.nm-sep{height:1px;background:var(--bdr);margin:4px 0}
.faq details{border-bottom:1px solid var(--bdr)}
.faq details:last-child{border-bottom:0}
.faq summary{padding:11px 14px;font-weight:700;font-size:13px;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center}
.faq summary::after{content:"+";color:var(--t3);font-size:15px}
.faq details[open] summary::after{content:"–"}
.faq summary:hover{background:var(--sub)}
.faq .fa{padding:0 14px 13px;font-size:12.5px;color:var(--t2);line-height:1.65}
.faq .fa b{color:var(--t1)}
.faq .fa code{background:var(--bg);border:1px solid var(--bdr);border-radius:3px;padding:0 5px;font-size:11.5px}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#181818;color:#fff;padding:9px 16px;border-radius:var(--r);font-size:12.5px;opacity:0;pointer-events:none;transition:opacity .18s;z-index:95;box-shadow:0 6px 20px rgba(0,0,0,.3);max-width:90vw}
.toast.show{opacity:1}
#resumebar{position:fixed;top:0;left:0;right:0;z-index:80;background:var(--blue-l);border-bottom:1px solid var(--blue);padding:7px 16px;display:none;align-items:center;justify-content:center;gap:12px;font-size:12.5px;flex-wrap:wrap}
#resumebar.show{display:flex}

@media(max-width:840px){
  input,select,textarea{font-size:16px}
  #gh{position:static;height:auto;min-height:0;flex-wrap:wrap;gap:6px 8px;padding:8px 10px;padding-top:calc(8px + env(safe-area-inset-top,0px))}
  .gh-search{order:3;flex-basis:100%;max-width:none}
  #navbar{top:env(safe-area-inset-top,0px)}
  .ovl{padding:20px 8px}
  .addline input,.addline select,.wc-add input,.filters input,.filters select{font-size:16px}
  #main{padding:12px 10px}
  .wgrid{grid-template-columns:1fr}
  .wcol{min-height:auto}
  .mg-c{min-height:60px}
  .g2{grid-template-columns:1fr}
  .rowacts{opacity:1}
  .gh-search{max-width:none}
  .gh-brand span{display:none}
  .dl{grid-template-columns:90px 1fr}
}
@media(pointer:coarse){
  .btn.xs{padding:6px 11px}
  .iconb{padding:6px 9px;font-size:15px}
  .chk{width:20px;height:20px}
  .star{font-size:17px}
  .nt{padding:13px 16px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
@media print{
  #gh,#navbar,.ph-r,.tabs,.filters,.rowacts,.wc-add,.addline{display:none!important}
  #main{padding:0;max-width:none}
  .card,.kpi{box-shadow:none}
}
</style>
</head>
<body>

<div id="resumebar"><span id="resumeTxt"></span><button class="btn sm" onclick="resumeSync()">Resume sync</button><button class="btn gh2 sm" onclick="g('resumebar').classList.remove('show')">Not now</button></div>

<header id="gh">
  <div class="gh-brand"><div class="gh-logo">C1</div><span>Clario One</span></div>
  <div class="gh-search"><span class="mag">⌕</span><input id="ghSearch" placeholder="Search tasks, accounts, deals, people, meetings…  (Ctrl+K)" autocomplete="off"><div id="srchres"></div></div>
  <div class="gh-right">
    <button class="gh-sync" onclick="nav('settings')" title="Sync: green = synced, blue = syncing, red = attention, grey = not connected. Tap for Settings."><span class="sdot" id="sdot"></span><span id="stxt">Local only</span></button>
    <div style="position:relative"><button class="btn sm" onclick="toggleNewMenu(event)">+ New ▾</button><div id="newmenu"></div></div>
    <button class="gh-sync" style="font-weight:800;font-size:14px" title="Help & FAQ" onclick="nav('help')">?</button>
  </div>
</header>
<nav id="navbar"></nav>
<div id="moremenu"></div>
<main id="main"></main>

<!-- Task / call modal -->
<div class="ovl" id="mTask"><div class="modal">
  <h3 id="mTaskTitle">New Item<button class="mx" type="button" onclick="closeM()">✕</button></h3>
  <div class="mbody">
  <div class="fld"><label>Title <span class="req">*</span></label><input id="tTitle"></div>
  <div class="g2">
    <div class="fld"><label>Type</label><select id="tType" onchange="taskTypeUI()"><option value="task">Task</option><option value="call">Call</option></select></div>
    <div class="fld"><label>Owner</label><div style="display:flex;gap:6px"><select id="tOwner" onchange="ownerAutofill()" style="flex:1"></select><button class="btn gh2 sm" type="button" title="New person" onclick="quickNew('person')">+</button></div></div>
    <div class="fld"><label>Priority</label><select id="tPri"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></div>
    <div class="fld"><label>Department</label><div style="display:flex;gap:6px"><select id="tDept" style="flex:1"></select><button class="btn gh2 sm" type="button" title="New department" onclick="quickNew('dept')">+</button></div></div>
    <div class="fld" id="fDue"><label>Due date</label><input type="date" id="tDue" onchange="dueChanged()"></div>
    <div class="fld" id="fAt"><label>Time (for day plan)</label><input type="time" id="tAt"></div>
    <div class="fld" id="fEst"><label>Estimate (min)</label><input type="number" id="tEst" min="5" step="5" placeholder="30"></div>
    <div class="fld" id="fRepeat"><label>Repeat</label><select id="tRepeat"><option value="">Does not repeat</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="fortnightly">Fortnightly</option><option value="monthly">Monthly</option></select></div>
    <div class="fld" id="fFup" style="display:none"><label>Follow up on</label><input type="date" id="tFup" onchange="this.dataset.auto=0"></div>
    <div class="fld" id="fWhen" style="display:none"><label>Call by</label><input type="datetime-local" id="tWhen"></div>
    <div class="fld" id="fPhone" style="display:none"><label>Phone</label><input id="tPhone" placeholder="+91…"></div>
    <div class="fld"><label>Account</label><div style="display:flex;gap:6px"><select id="tCust" style="flex:1" onchange="fillContact('tContact',this.value||null,'')"></select><button class="btn gh2 sm" type="button" title="New account" onclick="quickNew('cust')">+</button></div></div>
    <div class="fld" id="fTContact"><label>Account contact (FPR)</label><div style="display:flex;gap:6px"><select id="tContact" style="flex:1"></select><button class="btn gh2 sm" type="button" title="New contact for this account" onclick="quickNewContact('tContact')">+</button></div></div>
    <div class="fld"><label>Status</label><select id="tStatus"><option value="open">Open</option><option value="waiting">Waiting on owner</option><option value="done">Done</option></select></div>
  </div>
  <div class="fld"><label>Notes</label><textarea id="tNotes"></textarea></div>
  </div>
  <div class="macts"><button class="btn dg sm" id="tDel" style="display:none" onclick="delTask()">Delete</button>
  <div class="rr"><button class="btn gh2" onclick="closeM()">Cancel</button><button class="btn" onclick="saveTask()">Save</button></div></div>
</div></div>

<!-- Person modal -->
<div class="ovl" id="mPerson"><div class="modal">
  <h3 id="mPersonTitle">New Person<button class="mx" type="button" onclick="closeM()">✕</button></h3>
  <div class="mbody"><div class="g2">
    <div class="fld"><label>Name <span class="req">*</span></label><input id="pName"></div>
    <div class="fld"><label>Department</label><div style="display:flex;gap:6px"><select id="pDept" style="flex:1"></select><button class="btn gh2 sm" type="button" title="New department" onclick="quickNew('dept','pDept')">+</button></div></div>
    <div class="fld"><label>Role</label><input id="pRole"></div>
    <div class="fld"><label>Phone</label><input id="pPhone" type="tel"></div>
    <div class="fld"><label>Email</label><input id="pEmail" type="email"></div>
  </div>
  <div class="fld"><label>Notes</label><textarea id="pNotes" style="min-height:40px"></textarea></div></div>
  <div class="macts"><button class="btn dg sm" id="pDel" style="display:none" onclick="delPerson()">Delete</button>
  <div class="rr"><button class="btn gh2" onclick="closeM()">Cancel</button><button class="btn" onclick="savePerson()">Save</button></div></div>
</div></div>

<!-- Account modal -->
<div class="ovl" id="mCust"><div class="modal">
  <h3 id="mCustTitle">New Account<button class="mx" type="button" onclick="closeM()">✕</button></h3>
  <div class="mbody">
  <div class="g2">
    <div class="fld"><label>Account name <span class="req">*</span></label><input id="cName"></div>
    <div class="fld"><label>Segment</label><input id="cSeg" placeholder="QSR / Hotel / Retail…"></div>
    <div class="fld"><label>City</label><input id="cCity"></div>
    <div class="fld"><label>Department</label><div style="display:flex;gap:6px"><select id="cDept" style="flex:1"></select><button class="btn gh2 sm" type="button" title="New department" onclick="quickNew('dept','cDept')">+</button></div></div>
    <div class="fld"><label>Key account manager</label><div style="display:flex;gap:6px"><select id="cKam" style="flex:1"></select><button class="btn gh2 sm" type="button" title="New person" onclick="quickNewKam()">+</button></div></div>
  </div>
  <div class="fld"><label>Address</label><textarea id="cAddr" style="min-height:40px"></textarea></div>
  <div class="g2">
    <div class="fld"><label>Supply cadence</label><select id="cCadence"><option value="">One-off / none</option><option value="weekly">Weekly</option><option value="fortnightly">Fortnightly</option><option value="monthly">Monthly</option><option value="quarterly">Quarterly</option></select></div>
    <div class="fld"><label>Last order date</label><input type="date" id="cLastOrder"></div>
  </div>
  <div class="fld"><label>Typical order (note — SKUs, volume, run-rate)</label><input id="cSupplyNote" placeholder="e.g. 4 t/mo batters + sauces"></div>
  <div class="fld"><label>Notes</label><textarea id="cNotes"></textarea></div>
  </div>
  <div class="macts"><button class="btn dg sm" id="cDel" style="display:none" onclick="delCust()">Delete</button>
  <div class="rr"><button class="btn gh2" onclick="closeM()">Cancel</button><button class="btn" onclick="saveCust()">Save</button></div></div>
</div></div>

<!-- Activity entry edit modal -->
<div class="ovl" id="mActEdit"><div class="modal" style="max-width:480px">
  <h3><span>Edit log entry</span><button class="mx" type="button" onclick="closeM()">✕</button></h3>
  <div class="mbody">
  <div class="fld"><label>Type</label><select id="acEKind"><option value="note">Note</option><option value="call">Call</option><option value="meeting">Meeting</option></select></div>
  <div class="fld"><label>Entry</label>
    <div id="acEBar"></div>
    <div id="acEText" class="rte" contenteditable="true" data-ph="Edit the note or call summary…"></div></div>
  </div>
  <div class="macts"><div class="rr"><button class="btn gh2" onclick="closeM()">Cancel</button><button class="btn" onclick="saveActEdit()">Save</button></div></div>
</div></div>

<!-- Contact modal -->
<div class="ovl" id="mContact"><div class="modal" style="max-width:460px">
  <h3><span id="mContactTitle">New Contact</span><button class="mx" type="button" onclick="closeM()">✕</button></h3>
  <div class="mbody">
  <div class="fld"><label>Account</label><div style="display:flex;gap:6px"><select id="coCust" style="flex:1"></select><button class="btn gh2 sm" type="button" title="New account" onclick="quickNew('cust','coCust')">+</button></div></div>
  <div class="g2">
    <div class="fld"><label>Name <span class="req">*</span></label><input id="coEName"></div>
    <div class="fld"><label>Role</label><input id="coERole" placeholder="Head of purchasing…"></div>
    <div class="fld"><label>Phone</label><input id="coEPhone" type="tel"></div>
    <div class="fld"><label>Email</label><input id="coEEmail" type="email"></div>
  </div>
  <div class="fld"><label>Notes</label><textarea id="coENotes" style="min-height:40px"></textarea></div>
  </div>
  <div class="macts"><button class="btn dg sm" id="coDel" style="display:none" onclick="delContact()">Delete</button>
  <div class="rr"><button class="btn gh2" onclick="closeM()">Cancel</button><button class="btn" onclick="saveContact()">Save</button></div></div>
</div></div>

<!-- Deal modal -->
<div class="ovl" id="mDeal"><div class="modal">
  <h3 id="mDealTitle">New Deal<button class="mx" type="button" onclick="closeM()">✕</button></h3>
  <div class="mbody">
  <div class="fld"><label>Deal name <span class="req">*</span></label><input id="dlName"></div>
  <div class="g2">
    <div class="fld"><label>Account</label><div style="display:flex;gap:6px"><select id="dlCust" style="flex:1"></select><button class="btn gh2 sm" type="button" title="New account" onclick="quickNew('cust','dlCust')">+</button></div></div>
    <div class="fld"><label>Stage</label><select id="dlStage"></select></div>
    <div class="fld"><label>Value (₹)</label><input type="number" id="dlValue" min="0" step="1000"></div>
    <div class="fld"><label>Expected close</label><input type="date" id="dlClose"></div>
    <div class="fld"><label>Contact</label><select id="dlContact"></select></div>
    <div class="fld"><label>Product / service</label><div style="display:flex;gap:6px"><select id="dlProd" style="flex:1"></select><button class="btn gh2 sm" type="button" title="New product / service" onclick="quickNew('prod','dlProd')">+</button></div></div>
  </div>
  <div class="fld"><label>Line items — product · qty · rate</label><div id="dlLines"></div><button class="btn gh2 xs" type="button" style="margin-top:4px" onclick="dlAddLine()">+ Add line</button><div id="dlLineTot" class="note" style="margin-top:5px"></div></div>
  <div class="fld"><label>Notes</label><textarea id="dlNotes"></textarea></div>

<script>
/* ═══ CORE ═══ */
const APP_VER='8.0.0',DB_FILE='db.json',DB_TMP='db.tmp',LS_KEY='cx_state',THEME_KEY='cx_theme',ENC_KEY='cx_enc';
const STAGES=['Prospect','Qualified','Proposal','Negotiation','Won','Lost'];
const STAGE_P={Prospect:10,Qualified:30,Proposal:55,Negotiation:75,Won:100,Lost:0};
const g=id=>document.getElementById(id);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const now=()=>new Date().toISOString();
const today=()=>new Date().toISOString().slice(0,10);
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const jss=s=>String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
const addDays=(ds,n)=>{const d=new Date(ds+'T12:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
const ageDays=ds=>Math.floor((new Date(today()+'T12:00')-new Date(ds+'T12:00'))/86400000);
const fmtD=ds=>ds?new Date(ds+'T12:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'}):'';
const fmtDT=s=>s?new Date(s).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'numeric',minute:'2-digit'}):'';
const fmtMoney=v=>{v=+v||0;if(v>=1e7)return'₹'+(v/1e7).toFixed(2).replace(/\.00$/,'')+' Cr';if(v>=1e5)return'₹'+(v/1e5).toFixed(2).replace(/\.00$/,'')+' L';return'₹'+v.toLocaleString('en-IN');};
const mondayOf=ds=>{const d=new Date(ds+'T12:00');const wd=(d.getDay()+6)%7;d.setDate(d.getDate()-wd);return d.toISOString().slice(0,10);};
const weekKey=ds=>'W'+mondayOf(ds);
const monthKey=ds=>ds.slice(0,7);
function toast(m){const t=g('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),2600);}

/* ═══ STATE ═══ */
var tasks=[],people=[],agenda=[],meetings=[],decisions=[],customers=[],contacts=[],plans=[],deals=[],activities=[],toolruns=[],opps=[],journals=[];
var depts=['Operations','Finance','Sales','Supply Chain','HR','Quality'];
var products=['Ingredients supply','Solutions consulting','Private label'];
var stateUpdatedAt=now();
const TABLES=['tasks','people','agenda','meetings','decisions','customers','contacts','plans','deals','activities','toolruns','opps','journals'];
function getState(){const s={version:APP_VER,updatedAt:stateUpdatedAt,depts,products};TABLES.forEach(t=>s[t]=window[t]);return s;}
function applyState(s){if(!s||typeof s!=='object')return;TABLES.forEach(t=>{window[t]=Array.isArray(s[t])?s[t]:[];});if(Array.isArray(s.depts)&&s.depts.length)depts=s.depts;if(Array.isArray(s.products)&&s.products.length)products=s.products;stateUpdatedAt=s.updatedAt||now();}
function mergeArr(local,remote){const m=new Map(local.map(x=>[x.id,x]));for(const r of(remote||[])){const l=m.get(r.id);if(!l||(r.updated_at||'')>(l.updated_at||''))m.set(r.id,r);}return[...m.values()];}
function mergeRemote(rm){if(!rm||typeof rm!=='object')return;TABLES.forEach(t=>{window[t]=mergeArr(window[t],rm[t]);});if(Array.isArray(rm.depts))depts=[...new Set([...depts,...rm.depts])];if(Array.isArray(rm.products))products=[...new Set([...products,...rm.products])];}
function persist(){stateUpdatedAt=now();try{localStorage.setItem(LS_KEY,JSON.stringify(getState()));}catch(e){toast('Local storage full — export a backup.');}if(_fsDir)schedSave();if(gActive())gSched();renderNav();}
function loadLS(){try{const r=localStorage.getItem(LS_KEY);if(r)applyState(JSON.parse(r));}catch(e){}migrateNextActions();}
function migrateNextActions(){let m=0;const n=now();customers.filter(c=>!c.deleted&&c.next_action).forEach(c=>{
  const dup=tasks.find(t=>t.customer_id===c.id&&t.is_next_action&&t.status!=='done');
  if(!dup){const owner=c.kam_id||'me';const due=c.next_action_due||addDays(today(),3);
    tasks.push({id:uid(),type:'task',title:c.next_action,owner,is_next_action:true,customer_id:c.id,dept:c.dept||'',due,original_due:due,at:null,estimate_min:5,priority:'medium',status:owner!=='me'?'waiting':'open',notes:'',created_at:n,updated_at:n});m++;}
  c.next_action=null;c.next_action_due=null;});
  if(m)persist();}

const T=()=>tasks.filter(t=>!t.deleted);
const P=()=>people.filter(p=>!p.deleted);
const AG=()=>agenda.filter(a=>!a.deleted);
const M=()=>meetings.filter(m=>!m.deleted);
const DC=()=>decisions.filter(d=>!d.deleted);
const CU=()=>customers.filter(c=>!c.deleted);
const CO=()=>contacts.filter(c=>!c.deleted);
const PL=()=>plans.filter(p=>!p.deleted);
const DL=()=>deals.filter(d=>!d.deleted);
const AC=()=>activities.filter(a=>!a.deleted);
const TR=()=>toolruns.filter(t=>!t.deleted);
const OP=()=>opps.filter(o=>!o.deleted);
const pname=id=>id==='me'||!id?'Me':(P().find(p=>p.id===id)||{}).name||'—';
const cname=id=>id?(CU().find(c=>c.id===id)||{}).name||'':'';
/* clickable name chips — navigate to the entity */
const custLink=(id,cls)=>id&&cname(id)?`<span class="${cls||'pill p'} lnk" onclick="event.stopPropagation();nav('accounts','${id}')" title="Open account">${esc(cname(id))}</span>`:'';
const personLink=(id,cls)=>id&&id!=='me'?`<span class="${cls||'pill b'} lnk" onclick="event.stopPropagation();nav('people','${id}')" title="Open person">${esc(pname(id))}</span>`:'';
const deptLink=(d,cls)=>d?`<span class="${cls||'pill n'} lnk" onclick="event.stopPropagation();deptFilter('${esc(d)}')" title="Filter by department">${esc(d)}</span>`:'';
function deptFilter(d){window._cd=d;cTab='mine';nav('commit');}
const openMine=()=>T().filter(t=>t.status==='open'&&(t.owner==='me'||!t.owner));
const waiting=()=>T().filter(t=>t.status==='waiting');
const openDeals=()=>DL().filter(d=>d.stage!=='Won'&&d.stage!=='Lost');
function logActivity(kind,text,customer_id,deal_id,contact_id,html){const n=now();activities.push({id:uid(),kind,text,html:html||null,customer_id:customer_id||null,deal_id:deal_id||null,contact_id:contact_id||null,at:n,created_at:n,updated_at:n});}

/* ═══ ENCRYPTION (optional AES-GCM on db.json) ═══ */
let _encKey=null,_encMeta=null;
try{_encMeta=JSON.parse(localStorage.getItem(ENC_KEY)||'null');}catch(e){}
const b64=b=>{let s='';const u=new Uint8Array(b);for(let i=0;i<u.length;i+=8192)s+=String.fromCharCode.apply(null,u.subarray(i,i+8192));return btoa(s);};
const ub64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function deriveKey(pass,saltB64){const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:ub64(saltB64),iterations:310000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
async function encJson(json){const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},_encKey,new TextEncoder().encode(json));return JSON.stringify({clarioEnc:1,salt:_encMeta.salt,iv:b64(iv),ct:b64(ct)});}
async function decEnvelope(env){if(!_encKey){const pass=await askText('This file is encrypted. Enter passphrase:',{title:'Passphrase',type:'password',ok:'Unlock'});if(!pass)throw new Error('Passphrase required');_encKey=await deriveKey(pass,env.salt);if(!_encMeta){_encMeta={on:true,salt:env.salt};localStorage.setItem(ENC_KEY,JSON.stringify(_encMeta));}}
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:ub64(env.iv)},_encKey,ub64(env.ct));return JSON.parse(new TextDecoder().decode(pt));}
async function parseDb(text){const j=JSON.parse(text);if(j&&j.clarioEnc){try{return await decEnvelope(j);}catch(e){_encKey=null;toast('Wrong passphrase or corrupted file.');throw e;}}return j;}
async function serializeDb(){const json=JSON.stringify(getState(),null,2);if(_encMeta&&_encMeta.on){if(!_encKey){const pass=await askText('Enter encryption passphrase to save:',{title:'Passphrase',type:'password',ok:'Save'});if(!pass)throw new Error('no pass');_encKey=await deriveKey(pass,_encMeta.salt);}return encJson(json);}return json;}
async function enableEnc(){const p1=await askText('Choose an encryption passphrase (losing it means losing the synced file):',{title:'Encrypt db.json',type:'password',ok:'Next'});if(!p1)return;const p2=await askText('Repeat passphrase:',{title:'Confirm passphrase',type:'password',ok:'Encrypt'});if(p1!==p2){toast('Passphrases do not match.');return;}
  _encMeta={on:true,salt:b64(crypto.getRandomValues(new Uint8Array(16)))};_encKey=await deriveKey(p1,_encMeta.salt);localStorage.setItem(ENC_KEY,JSON.stringify(_encMeta));persist();if(_fsDir)await saveToFile();toast('db.json is now AES-256 encrypted.');renderView();}
async function disableEnc(){if(!await askConfirm('Turn off encryption? db.json will be written as plain text.',{title:'Disable encryption',ok:'Turn off',danger:true}))return;_encMeta=null;_encKey=null;localStorage.removeItem(ENC_KEY);persist();if(_fsDir)await saveToFile();toast('Encryption off.');renderView();}

/* ═══ ONEDRIVE SYNC ═══ */
let _fsDir=null,_fsSaving=false,_fsQ=false,_fsTimer=null,_fsLastM=0,_fsWatch=null;
const hasFS=()=>typeof window.showDirectoryPicker==='function';
function fsIDB(){return new Promise((res,rej)=>{const r=indexedDB.open('cx_fs',1);r.onupgradeneeded=()=>r.result.createObjectStore('h');r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function hSave(h){try{const db=await fsIDB();db.transaction('h','readwrite').objectStore('h').put(h,'dir');}catch(e){}}
async function hLoad(){try{const db=await fsIDB();return await new Promise(r=>{const q=db.transaction('h').objectStore('h').get('dir');q.onsuccess=()=>r(q.result||null);q.onerror=()=>r(null);});}catch(e){return null;}}
async function hClear(){try{const db=await fsIDB();db.transaction('h','readwrite').objectStore('h').delete('dir');}catch(e){}}
async function fMtime(){try{const fh=await _fsDir.getFileHandle(DB_FILE);return(await fh.getFile()).lastModified;}catch(e){return 0;}}
function syncUI(st,lbl){const d=g('sdot'),t=g('stxt');d.className='sdot '+(st==='ok'?'ok':st==='busy'?'busy':st==='err'?'err':'');t.textContent=lbl||(st==='ok'?'Synced':st==='busy'?'Syncing…':st==='err'?'Attention':'Local only');}
async function linkFolder(){if(!hasFS()){toast('Folder link needs Edge/Chrome on desktop. Use export/import here.');return;}
  try{const dir=await showDirectoryPicker({mode:'readwrite',id:'clarioexec'});_fsDir=dir;await hSave(dir);await pullDisk(true);persist();await saveToFile();startWatch();syncUI('ok',dir.name);toast('Linked '+dir.name+'. Autosync on.');renderView();}catch(e){if(e.name!=='AbortError')toast('Link failed: '+e.message);}}
async function unlinkFolder(){_fsDir=null;stopWatch();await hClear();syncUI('','Local only');toast('Unlinked. Data stays on this device.');renderView();}
function schedSave(){clearTimeout(_fsTimer);_fsTimer=setTimeout(saveToFile,800);}
async function saveToFile(){if(!_fsDir)return;if(_fsSaving){_fsQ=true;return;}_fsSaving=true;syncUI('busy');
  try{
    const m=await fMtime();
    if(m&&_fsLastM&&m>_fsLastM){try{const fh=await _fsDir.getFileHandle(DB_FILE);mergeRemote(await parseDb(await(await fh.getFile()).text()));localStorage.setItem(LS_KEY,JSON.stringify(getState()));reRender();}catch(e){}}
    const out=await serializeDb();
    const tmp=await _fsDir.getFileHandle(DB_TMP,{create:true});const w1=await tmp.createWritable();await w1.write(out);await w1.close();
    const db=await _fsDir.getFileHandle(DB_FILE,{create:true});const w2=await db.createWritable();await w2.write(out);await w2.close();
    try{await _fsDir.removeEntry(DB_TMP);}catch(e){}
    _fsLastM=await fMtime();syncUI('ok',_fsDir.name);
  }catch(e){syncUI('err');if(e.message!=='no pass')toast('Save failed: '+e.message);}
  finally{_fsSaving=false;if(_fsQ){_fsQ=false;saveToFile();}}}
async function pullDisk(silent){if(!_fsDir)return;try{const fh=await _fsDir.getFileHandle(DB_FILE);const f=await fh.getFile();mergeRemote(await parseDb(await f.text()));_fsLastM=f.lastModified;localStorage.setItem(LS_KEY,JSON.stringify(getState()));if(!silent)toast('Pulled latest.');renderView();}catch(e){if(e.name!=='NotFoundError'&&!silent)toast('Pull failed: '+e.message);}}
async function syncNow(){if(!_fsDir){toast('No folder linked.');return;}await pullDisk(true);await saveToFile();toast('Synced ⇅');}
async function checkDisk(){if(!_fsDir||_fsSaving)return;try{const m=await fMtime();if(m&&m>_fsLastM){const fh=await _fsDir.getFileHandle(DB_FILE);const f=await fh.getFile();mergeRemote(await parseDb(await f.text()));_fsLastM=m;localStorage.setItem(LS_KEY,JSON.stringify(getState()));reRender();syncUI('ok',_fsDir.name+' · updated');}}catch(e){}}
function startWatch(){stopWatch();_fsWatch=setInterval(checkDisk,20000);}
function stopWatch(){clearInterval(_fsWatch);_fsWatch=null;}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&_fsDir)setTimeout(checkDisk,500);});
let _pendingHandle=null;
async function restoreFolder(){if(!hasFS())return;const h=await hLoad();if(!h)return;
  try{const p=await h.queryPermission({mode:'readwrite'});
    if(p==='granted'){_fsDir=h;await pullDisk(true);persist();startWatch();syncUI('ok',h.name);return;}
    if(p==='prompt'){_pendingHandle=h;g('resumeTxt').innerHTML='Resume OneDrive sync with <b>'+esc(h.name)+'</b>?';g('resumebar').classList.add('show');syncUI('err',h.name+' — resume');}}catch(e){}}
async function resumeSync(){const h=_pendingHandle;if(!h)return;try{if(await h.requestPermission({mode:'readwrite'})==='granted'){_fsDir=h;await pullDisk(true);persist();startWatch();syncUI('ok',h.name);toast('Sync resumed.');}else toast('Permission declined.');}catch(e){toast(e.message);}g('resumebar').classList.remove('show');}
function exportJson(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(getState(),null,2)],{type:'application/json'}));a.download='db.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1500);}
g('jsonFile').onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const j=await parseDb(await f.text());if(!j.tasks&&!j.customers){toast('Not a Clario file.');return;}mergeRemote(j);persist();renderView();toast('Imported and merged.');}catch(err){toast('Import failed.');}e.target.value='';};

/* ═══ NAV ═══ */
var view='home',viewArg=null;
const NAVS=[['home','Home'],['planner','Planner'],['tasks','Tasks'],['accounts','Accounts'],['people','People']];
const NAVMORE=[
  ['Work',[['commit','Commitments']]],
  ['CRM',[['contacts','Contacts'],['pipeline','Pipeline']]],
  ['Team',[['meetings','Meetings']]],
  ['Insight',[['decide','Decide'],['dash','Dashboards'],['review','Review']]],
  ['System',[['settings','Settings']]]];
const MOREIDS=NAVMORE.flatMap(([g,items])=>items.map(i=>i[0]));
function renderNav(){const td=today();
  const nHome=openMine().filter(t=>t.type!=='call'&&t.due&&t.due<=td).length;
  const nChase=waiting().length;
  const bdg={home:nHome,commit:nChase};
  const inMore=MOREIDS.includes(view)||(view==='meeting');
  const tabs=NAVS.map(([id,lbl])=>`<button class="nt ${view===id||(view==='deal'&&id==='pipeline')?'on':''}" onclick="nav('${id}')">${lbl}${bdg[id]?`<span class="bdg ${id==='home'?'hot':''}">${bdg[id]}</span>`:''}</button>`).join('');
  const menu=NAVMORE.map(([grp,items])=>`<div class="nm-h">${grp}</div>`+items.map(([id,lbl])=>`<button class="nm-i ${view===id||(view==='meeting'&&id==='meetings')?'sel':''}" onclick="nav('${id}');toggleMore()">${lbl}</button>`).join('')).join('');
  const nb=g('navbar');nb.innerHTML=tabs+`<button id="moreBtn" class="nt ${inMore?'on':''}" onclick="toggleMore(event)">More ▾</button>`;
  const mm=g('moremenu');if(mm)mm.innerHTML=menu;
  try{if(nb.querySelector){const on=nb.querySelector('.nt.on');if(on&&on.scrollIntoView)on.scrollIntoView({block:'nearest',inline:'center'});}}catch(e){}}
function toggleMore(e){if(e)e.stopPropagation();const m=g('moremenu');if(!m)return;
  const willOpen=!m.classList.contains('on');
  if(willOpen){const b=g('moreBtn');if(b&&b.getBoundingClientRect){const r=b.getBoundingClientRect();m.style.top=(r.bottom+4)+'px';m.style.right=Math.max(6,window.innerWidth-r.right)+'px';m.style.left='auto';}}
  m.classList.toggle('on');}
async function nav(v,arg){
  flushEditors();persist();view=v;viewArg=arg??null;renderView();}

  if(view==='task'&&viewArg){const t=tasks.find(x=>x.id===viewArg);const el=g('tnText');if(t&&el){const h=sanitizeHtml(el.innerHTML);if((h||'')!==(t.notes_html||'')){t.notes_html=h;t.notes=htmlToText(h);t.updated_at=now();if(typeof logTaskNotes==='function')logTaskNotes(t);}}}

  return out.slice(0,16);}
let _srchIdx=[],_srchSel=-1;
function _srchPaint(){const box=g('srchres');[...box.querySelectorAll('.sr-item[data-i]')].forEach(el=>{el.classList.toggle('sel',+el.dataset.i===_srchSel);});}
function _srchGo(i){const box=g('srchres');if(_srchIdx[i]){box.classList.remove('on');g('ghSearch').value='';_srchSel=-1;_srchIdx[i].go();}}
g('ghSearch').addEventListener('input',e=>{const q=e.target.value.trim();const box=g('srchres');
  if(q.length<2){box.classList.remove('on');_srchSel=-1;return;}
  _srchIdx=globalSearch(q);_srchSel=_srchIdx.length?0:-1;
  box.innerHTML=_srchIdx.length?_srchIdx.map((r,i)=>`<div class="sr-item${i===0?' sel':''}" data-i="${i}"><span class="sr-k ${r.k}">${r.k==='T'?'Task':r.k==='A'?'Acct':r.k==='D'?'Deal':r.k==='P'?'Pers':'Meet'}</span><span style="flex:1"><b>${esc(r.label)}</b> <span style="color:var(--t3);font-size:11px">· ${esc(r.sub)}</span></span></div>`).join(''):'<div class="sr-item" style="color:var(--t4)">No matches.</div>';
  box.classList.add('on');
  box.querySelectorAll('.sr-item[data-i]').forEach(el=>{el.onmouseenter=()=>{_srchSel=+el.dataset.i;_srchPaint();};el.onclick=()=>_srchGo(+el.dataset.i);});});
g('ghSearch').addEventListener('keydown',e=>{const box=g('srchres');if(!box.classList.contains('on'))return;
  if(e.key==='ArrowDown'){e.preventDefault();_srchSel=Math.min(_srchSel+1,_srchIdx.length-1);_srchPaint();}
  else if(e.key==='ArrowUp'){e.preventDefault();_srchSel=Math.max(_srchSel-1,0);_srchPaint();}
  else if(e.key==='Enter'){e.preventDefault();if(_srchSel>=0)_srchGo(_srchSel);}

function parseQA(txt){txt=txt.trim();const r={type:'task',title:txt,due:null,time:null,priority:'medium',owner:'me'};
  if(/^call\s/i.test(txt))r.type='call';
  if(/!high|urgent/i.test(txt))r.priority='high';if(/!low/i.test(txt))r.priority='low';
  const at=txt.match(/@(\w[\w\s]*?)(?=\s|$)/);let pMatch=null;
  if(at)pMatch=P().find(p=>p.name.toLowerCase().startsWith(at[1].toLowerCase()));
  if(!pMatch)for(const p of P()){if(new RegExp('\\b'+p.name.split(' ')[0]+'\\b','i').test(txt)){pMatch=p;break;}}
  if(pMatch&&r.type!=='call')r.owner=pMatch.id;
  if(pMatch&&r.type==='call')r.callee=pMatch;
  const td=today();
  if(/\btoday\b/i.test(txt))r.due=td;else if(/\btomorrow\b/i.test(txt))r.due=addDays(td,1);else if(/\bnext week\b/i.test(txt))r.due=addDays(td,7);
  const days=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  days.forEach((d,i)=>{if(new RegExp('\\b'+d+'\\b','i').test(txt)){const dt=new Date();dt.setDate(dt.getDate()+((i-dt.getDay()+7)%7||7));r.due=dt.toISOString().slice(0,10);}});
  const tm=txt.match(/\b(\d{1,2})(?::(\d{2}))?\s*(am|pm)\b/i);
  if(tm){let h=+tm[1],mi=tm[2]?+tm[2]:0;if(tm[3].toLowerCase()==='pm'&&h<12)h+=12;if(tm[3].toLowerCase()==='am'&&h===12)h=0;r.time=String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0');}
  r.title=txt.replace(/^call\s+/i,'').replace(/@\w[\w]*/g,'').replace(/\btoday\b|\btomorrow\b|\bnext week\b/gi,'').replace(new RegExp('\\b('+days.join('|')+')\\b','gi'),'').replace(/\b\d{1,2}(?::\d{2})?\s*(am|pm)\b/gi,'').replace(/!high|!low|urgent/gi,'').replace(/\s+/g,' ').trim().replace(/\s+(by|on|to)$/i,'')||txt;
  return r;}
function quickAdd(dueOverride){const inp=g('qaInput');const v=(inp?inp.value:'').trim();if(!v)return;const r=parseQA(v);if(dueOverride)r.due=dueOverride;const n=now();

function drawBars(cv,labels,values,color){const c=cv.getContext('2d');const W=cv.width=cv.clientWidth*2,H=cv.height=cv.clientHeight*2;c.scale(1,1);c.clearRect(0,0,W,H);
  const max=Math.max(...values,1);const n=values.length;const pad=30,bw=Math.min(70,(W-pad*2)/n*.62),step=(W-pad*2)/n;
  c.font='600 19px Inter';c.textAlign='center';
  values.forEach((v,i)=>{const x=pad+step*i+step/2;const h=(H-90)*(v/max);
    c.fillStyle=color||'#0176d3';c.beginPath();c.roundRect(x-bw/2,H-52-h,bw,h,[6,6,0,0]);c.fill();
    c.fillStyle='#706e6b';c.fillText(String(labels[i]).slice(0,8),x,H-26);
    c.fillStyle='#181818';c.fillText(v?String(v):'',x,H-60-h);});}
function drawPareto(cv,labels,values){const c=cv.getContext('2d');const W=cv.width=cv.clientWidth*2,H=cv.height=cv.clientHeight*2;c.clearRect(0,0,W,H);
  const idx=values.map((v,i)=>[v,i]).sort((a,b)=>b[0]-a[0]);const sv=idx.map(x=>x[0]),sl=idx.map(x=>labels[x[1]]);
  const total=sv.reduce((a,b)=>a+b,0)||1;const max=Math.max(...sv,1);const n=sv.length;const pad=34,step=(W-pad*2)/n,bw=Math.min(64,step*.6);
  let cum=0;const pts=[];
  c.font='600 18px Inter';c.textAlign='center';
  sv.forEach((v,i)=>{cum+=v;const x=pad+step*i+step/2;const h=(H-110)*(v/max);
    c.fillStyle=cum/total<=.82?'#0176d3':'#c9c9c9';c.beginPath();c.roundRect(x-bw/2,H-64-h,bw,h,[5,5,0,0]);c.fill();
    c.fillStyle='#706e6b';c.fillText(String(sl[i]).slice(0,7),x,H-36);
    pts.push([x,40+(H-150)*(1-cum/total)]);});
  c.strokeStyle='#dd7a01';c.lineWidth=4;c.beginPath();pts.forEach((p,i)=>i?c.lineTo(p[0],p[1]):c.moveTo(p[0],p[1]));c.stroke();
  c.fillStyle='#dd7a01';pts.forEach(p=>{c.beginPath();c.arc(p[0],p[1],6,0,7);c.fill();});
  c.fillStyle='#dd7a01';c.textAlign='left';c.fillText('cumulative %',pad,26);}
function drawTrend(cv,labels,s1,s2){const c=cv.getContext('2d');const W=cv.width=cv.clientWidth*2,H=cv.height=cv.clientHeight*2;c.clearRect(0,0,W,H);
  const max=Math.max(...s1,...s2,1);const n=labels.length;const pad=36,step=(W-pad*2)/(n-1||1);
  const line=(vals,col)=>{c.strokeStyle=col;c.lineWidth=4;c.beginPath();vals.forEach((v,i)=>{const x=pad+step*i,y=30+(H-100)*(1-v/max);i?c.lineTo(x,y):c.moveTo(x,y);});c.stroke();
    c.fillStyle=col;vals.forEach((v,i)=>{const x=pad+step*i,y=30+(H-100)*(1-v/max);c.beginPath();c.arc(x,y,6,0,7);c.fill();});};
  line(s2,'#c9c9c9');line(s1,'#2e844a');
  c.font='600 18px Inter';c.fillStyle='#706e6b';c.textAlign='center';
  labels.forEach((l,i)=>c.fillText(l,pad+step*i,H-16));
  c.textAlign='left';c.fillStyle='#2e844a';c.fillText('completed',pad,20);c.fillStyle='#939393';c.fillText('added',pad+150,20);}
function drawQuad(cv,items){const c=cv.getContext('2d');const W=cv.width=cv.clientWidth*2,H=cv.height=cv.clientHeight*2;c.clearRect(0,0,W,H);
  const pad=50;c.strokeStyle='#e5e5e5';c.lineWidth=2;
  c.strokeRect(pad,pad,W-pad*2,H-pad*2);
  c.beginPath();c.moveTo(W/2,pad);c.lineTo(W/2,H-pad);c.moveTo(pad,H/2);c.lineTo(W-pad,H/2);c.stroke();
  c.font='700 18px Inter';c.fillStyle='#939393';c.textAlign='center';
  c.fillText('QUICK WINS',pad+(W/2-pad)/2,pad-14);c.fillText('BIG BETS',W/2+(W/2-pad)/2,pad-14);
  c.fillText('FILL-INS',pad+(W/2-pad)/2,H-pad+30);c.fillText('THANKLESS',W/2+(W/2-pad)/2,H-pad+30);
  c.save();c.translate(20,H/2);c.rotate(-Math.PI/2);c.fillText('IMPACT →',0,0);c.restore();
  c.fillText('EFFORT →',W/2,H-12);
  items.forEach(o=>{const x=pad+(W-pad*2)*((o.effort-0.5)/5);const y=H-pad-(H-pad*2)*((o.impact-0.5)/5);
    c.fillStyle=o.status==='done'?'#2e844a':o.impact>=4&&o.effort<=2?'#0176d3':'#706e6b';
    c.beginPath();c.arc(x,y,10,0,7);c.fill();
    c.font='600 16px Inter';c.fillStyle='#181818';c.textAlign='left';c.fillText(String(o.title).slice(0,16),x+14,y+5);c.font='700 18px Inter';});}

function setTaskAt(id,val){const t=tasks.find(x=>x.id===id);if(t&&val){t.at=val;t.updated_at=now();persist();renderView();}}

function addDump(){const i=g('dumpInp');const v=(i?i.value:'').trim();if(!v)return;const n=now();
  tasks.push({id:uid(),type:'task',title:v,owner:'me',due:null,estimate_min:30,priority:'medium',status:'open',dept:'',customer_id:null,notes:'',created_at:n,updated_at:n});

async function shutdownDay(ds){const open=T().filter(t=>t.type!=='call'&&t.status==='open'&&t.due&&t.due<=ds&&(t.owner==='me'||!t.owner));

  if(!await askConfirm(open.length+' unfinished item(s). Carry to tomorrow? Original due dates are kept for ageing.',{title:'Run shutdown',ok:'Carry over'}))return;
  const tm=addDays(ds,1);open.forEach(t=>{if(!t.original_due)t.original_due=t.due;t.due=tm;t.at=null;t.rolled=true;t.updated_at=now();});

function mnCmd(c){document.execCommand(c,false,null);const e=g('mnText');if(e)e.focus();}
async function mnLink(){const u=await askText('Link URL:',{title:'Add link',placeholder:'https://',ok:'Add'});if(!u)return;document.execCommand('createLink',false,u);}
function logMeetingNotes(m){if(!m||!m.customer_id||!m.notes_html)return;const label='Meeting notes: '+m.title;let a=activities.find(x=>x.meeting_id===m.id&&!x.deleted);const n=now();
  if(a){a.text=label;a.html=m.notes_html;a.updated_at=n;}
  else activities.push({id:uid(),kind:'meeting',text:label,html:m.notes_html,meeting_id:m.id,customer_id:m.customer_id,at:n,created_at:n,updated_at:n});}
function saveMinutes(mid){const m=meetings.find(x=>x.id===mid);if(!m)return;const el=g('mnText');if(!el)return;m.notes_html=sanitizeHtml(el.innerHTML);m.notes=htmlToText(m.notes_html);m.updated_at=now();logMeetingNotes(m);persist();toast('Minutes saved'+(m.customer_id?' and logged to account.':'.'));}
function STPILL(m){return m.status==='done'?'<span class="pill g">Held</span>':m.status==='rescheduled'?'<span class="pill a">Rescheduled</span>':m.status==='noshow'?'<span class="pill r">Not attended</span>':`<button class="btn sm" onclick="closeMeeting('${m.id}')">Close out</button>`;}
async function closeMeeting(mid){const m=meetings.find(x=>x.id===mid);if(!m)return;
  const out=await askChoice('How did this meeting go?',[{label:'Held — mark done',value:'held'},{label:'Rescheduled — set new date',value:'resched'},{label:'Not attended',value:'noshow'}],{title:'Close out meeting'});
  if(!out)return;const n=now();
  if(out==='held'){meetingAgenda(m).forEach(a=>{a.status='raised';a.updated_at=n;});m.status='done';m.updated_at=n;if(m.customer_id){if(m.notes_html)logMeetingNotes(m);else logActivity('meeting','Meeting held: '+m.title,m.customer_id,null);}persist();renderView();toast('Marked held. Agenda items raised.');}
  else if(out==='noshow'){m.status='noshow';m.updated_at=n;persist();renderView();toast('Marked not attended.');}
  else{const nd=await askText('New date:',{title:'Reschedule',type:'date',value:addDays(m.date||today(),7),ok:'Reschedule'});if(!nd)return;
    m.status='rescheduled';m.updated_at=n;
    const nm={id:uid(),title:m.title,date:nd,time:m.time||'',duration:m.duration||60,dept:m.dept||'',customer_id:m.customer_id||null,attendee_ids:[...(m.attendee_ids||[])],status:'open',rescheduled_from:m.id,created_at:n,updated_at:n};
    meetings.push(nm);
    agenda.filter(a=>a.meeting_id===m.id&&a.status==='open').forEach(a=>{a.meeting_id=nm.id;a.updated_at=n;});
    persist();nav('meeting',nm.id);toast('Rescheduled to '+fmtD(nd)+'. Agenda carried over.');}}
function mAgendaAdd(mid){const i=g('mAgInput');const v=(i?i.value:'').trim();if(!v)return;const n=now();agenda.push({id:uid(),person_id:null,meeting_id:mid,text:v,status:'open',created_at:n,updated_at:n});persist();renderView();}
function mActionAdd(mid){const t=g('mActT').value.trim();if(!t)return;const o=g('mActO').value,d=g('mActD').value||null,n=now();const m=M().find(x=>x.id===mid);

g('icsFile').onchange=async e=>{const f=e.target.files[0];if(!f)return;const txt=await f.text();let n=0;
  txt.split('BEGIN:VEVENT').slice(1).forEach(ev=>{const sm=ev.match(/SUMMARY(?:;[^:\n]*)?:(.*)/);const ds=ev.match(/DTSTART(?:;[^:\n]*)?:(\d{8})(?:T(\d{4}))?/);
    if(sm&&ds){const date=ds[1].slice(0,4)+'-'+ds[1].slice(4,6)+'-'+ds[1].slice(6,8);const time=ds[2]?ds[2].slice(0,2)+':'+ds[2].slice(2,4):'';

      if(!M().find(m=>m.title===title&&m.date===date)){const nw=now();meetings.push({id:uid(),title,date,time,duration:60,dept:'',customer_id:null,attendee_ids:[],status:'open',created_at:nw,updated_at:nw});n++;}}});

var cTab='chase';
function vCommit(){const td=today();
  const chase=waiting().sort((a,b)=>(a.follow_up||'9').localeCompare(b.follow_up||'9'));
  const mine=openMine().filter(t=>t.type!=='call').sort((a,b)=>(a.due||'9999').localeCompare(b.due||'9999')||['high','medium','low'].indexOf(a.priority)-['high','medium','low'].indexOf(b.priority));

  const done=T().filter(t=>t.status==='done').sort((a,b)=>(b.updated_at||'').localeCompare(a.updated_at||'')).slice(0,15);

  const bulk=(cTab==='chase'||cTab==='mine');

  const body=cTab==='chase'?chaseHtmlB
    :cTab==='mine'?seccard('On my plate',filt(mine).length,filt(mine).map(t=>trow(t,{bulk:true})).join(''),'Clear.')
    :cTab==='calls'?seccard('Calls',filt(calls).length,filt(calls).map(t=>trow(t)).join(''),'No pending calls.')
    :seccard('Recently completed',done.length,done.map(t=>trow(t,{star:false})).join(''),'Nothing completed yet.');
  const bulkbar=bulk?`<div id="bulkbar" class="card" style="display:none;position:sticky;top:56px;z-index:5"><div class="cb" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><b id="bulkn">0 selected</b><button class="btn gh2 sm" onclick="bulkBump()">Reschedule +1d</button>${cTab==='chase'?'<button class="btn gh2 sm" onclick="bulkSnooze()">Snooze f/u +1d</button><button class="btn gh2 sm" onclick="bulkReassign()">Reassign…</button>':''}<button class="btn gh2 sm" onclick="bulkDone()">Mark done</button><button class="btn gh2 sm" onclick="bulkClear()">Clear</button></div></div>`:'';
  return pagehead('COMMITMENTS','Commitments','Both directions — what you owe, what others owe you',`<button class="btn gh2 sm" onclick="openTask(null,null,null,null,'call')">+ Call</button><button class="btn sm" onclick="openTask()">+ Task</button>`)+
  `<div class="tabs">
    <button class="tab ${cTab==='chase'?'on':''}" onclick="cTab='chase';renderView()">To chase <span class="num">(${chase.length})</span></button>
    <button class="tab ${cTab==='mine'?'on':''}" onclick="cTab='mine';renderView()">My plate <span class="num">(${mine.length})</span></button>
    <button class="tab ${cTab==='calls'?'on':''}" onclick="cTab='calls';renderView()">Calls <span class="num">(${calls.length})</span></button>
    <button class="tab ${cTab==='done'?'on':''}" onclick="cTab='done';renderView()">Done</button></div>
  <div class="filters"><select onchange="window._cd=this.value;renderView()"><option value="">All departments</option>${depts.map(d=>`<option${dv===d?' selected':''}>${esc(d)}</option>`).join('')}</select></div>

var _bulkSel=new Set();
function bulkTog(id,el){if(el&&el.checked)_bulkSel.add(id);else _bulkSel.delete(id);const b=g('bulkbar'),n=g('bulkn');if(b){b.style.display=_bulkSel.size?'':'none';if(n)n.textContent=_bulkSel.size+' selected';}}
function _bulkList(){return [..._bulkSel].map(id=>tasks.find(t=>t.id===id)).filter(Boolean);}
function bulkClear(){_bulkSel.clear();reRender();}
function bulkBump(){_bulkList().forEach(t=>{const base=t.due&&t.due>=today()?t.due:today();t.due=addDays(base,1);if(!t.original_due)t.original_due=t.due;t.at=null;t.updated_at=now();});_bulkSel.clear();persist();reRender();toast('Rescheduled.');}
function bulkSnooze(){_bulkList().forEach(t=>{const base=t.follow_up&&t.follow_up>=today()?t.follow_up:today();t.follow_up=addDays(base,1);t.updated_at=now();});_bulkSel.clear();persist();reRender();toast('Follow-ups pushed.');}

async function bulkReassign(){const who=await askChoice('Reassign selected to:',P().map(p=>({label:p.name,value:p.id})),{title:'Reassign'});if(!who)return;_bulkList().forEach(t=>{t.owner=who;t.status='waiting';t.updated_at=now();});_bulkSel.clear();persist();reRender();toast('Reassigned.');}

function agendaAdd(pid){const i=g('agInput');const v=(i?i.value:'').trim();if(!v)return;const n=now();agenda.push({id:uid(),person_id:pid,text:v,status:'open',created_at:n,updated_at:n});persist();renderView();}

function openSummaryWindow(title,html,plain){

    +'<div class="noprint" style="margin-bottom:6px"><button onclick="window.print()">Print / PDF</button><button id="cpy">Copy formatted</button><a href="'+mailto.replace(/"/g,'&quot;')+'"><button>Email (plain)</button></a></div>'
    +'<div class="noprint hint">To email <b>with</b> bullets and formatting: click <b>Copy formatted</b>, then paste into a new Outlook mail. The Email button opens a plain-text mail (mail apps strip formatting from links).</div>'
    +'<div id="doc">'+bodyHtml+'</div>'
    +'<scr'+'ipt>document.getElementById("cpy").addEventListener("click",async function(){try{var node=document.getElementById("doc");var htmlBlob=new Blob([node.innerHTML],{type:"text/html"});var textBlob=new Blob([node.innerText],{type:"text/plain"});await navigator.clipboard.write([new ClipboardItem({"text/html":htmlBlob,"text/plain":textBlob})]);this.textContent="Copied ✓";}catch(e){try{var r=document.createRange();r.selectNode(document.getElementById("doc"));var sel=window.getSelection();sel.removeAllRanges();sel.addRange(r);document.execCommand("copy");sel.removeAllRanges();this.textContent="Copied ✓";}catch(_){this.textContent="Copy failed — select & copy manually";}}});<\/scr'+'ipt>'

function pnameAny(id){const p=P().find(x=>x.id===id);if(p)return p.name;const c=CO().find(x=>x.id===id);return c?c.name:pname(id);}
function buildMeetingSummary(m,present){const ids=present||m.attendee_ids||[];const att=ids.map(pnameAny).join(', ')||'—';

  h+='<h3>Action items</h3>'+(acts.length?'<ul>'+acts.map(t=>'<li>'+esc2(t.title)+' — <b>'+esc2(pname(t.owner))+'</b>'+(t.due?', due '+fmtD(t.due):'')+'</li>').join('')+'</ul>':'<p>—</p>');

function meetingSummaryText(m,present){const ids=present||m.attendee_ids||[];const att=ids.map(pnameAny).join(', ')||'-';

function buildTaskSummary(t,present){const esc2=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const kind=t.type==='call'?'Call':'Task';const dd=t.type==='call'?(t.when||'').slice(0,10):(t.due||'');

  return h;}
function taskSummaryText(t,present){const dd=t.type==='call'?(t.when||'').slice(0,10):(t.due||'');const L=[(t.type==='call'?'CALL':'TASK')+': '+t.title];
  if(t.customer_id)L.push('Account: '+cname(t.customer_id));if(t.contact_id){const c=CO().find(x=>x.id===t.contact_id);if(c)L.push('Contact: '+c.name);}
  if(dd)L.push((t.type==='call'?'When: ':'Due: ')+fmtD(dd));L.push('Status: '+(t.status==='done'?'Done':t.status||'open'));
